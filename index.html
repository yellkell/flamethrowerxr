<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flamethrower XR - Pass-through</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    html,body { margin:0; height:100%; overflow:hidden; background:#000; touch-action:none; }
    canvas { display:block; }
    #ui {
      position:absolute; top:15px; left:15px; color:#ffaa00;
      font-family:sans-serif; text-shadow:0 0 12px #ff5500; z-index:10;
      font-size:18px; letter-spacing:1px; pointer-events:none;
    }
    #hint {
      position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
      color:#ffcc66; font-family:sans-serif; font-size:13px; opacity:.75;
      text-shadow:0 0 8px #ff5500; z-index:10; pointer-events:none; text-align:center;
    }
    .btn {
      position:absolute; left:50%; transform:translateX(-50%);
      padding:15px 30px; font-size:17px; font-weight:bold; color:#000;
      background:linear-gradient(#ffcc33,#ff5500); border:none; border-radius:10px;
      cursor:pointer; z-index:100; box-shadow:0 0 25px #ff5500;
      font-family:sans-serif; letter-spacing:1px;
    }
    #start   { top:46%; }
    #preview { top:46%; margin-top:64px; background:linear-gradient(#666,#222); color:#fff; box-shadow:0 0 15px #000; font-size:14px; padding:12px 22px; }
  </style>
</head>
<body>
  <div id="ui">FLAMETHROWER XR 🔥🌀</div>
  <button id="start" class="btn">ENTER AR PASS-THROUGH</button>
  <button id="preview" class="btn">👀 Preview in browser (no headset)</button>
  <div id="hint"></div>

  <script>
    let scene, camera, renderer, xrSession, controller1, controller2;
    let ball, ballCore, ballGlow, ballLight, ballHot;
    let velocity = new THREE.Vector3();
    let mode = 'idle';            // 'idle' | 'attracted' | 'free'
    let orbitAngle = 0, targetController = null;
    let isPreview = false, idleTime = 0;
    const flames = [];
    const tempVec = new THREE.Vector3();
    const homePos = new THREE.Vector3(0, 1.3, -1.0);

    // ---- collision: real room surfaces (floor + walls) ----
    const ballRadius = 0.1;
    let colliders = [];
    const _m = new THREE.Matrix4();
    const _a = new THREE.Vector3();
    const _n = new THREE.Vector3();
    // fallback floor (used until/unless real planes are detected)
    const floorCollider = {
      point: new THREE.Vector3(0, 0, 0), normal: new THREE.Vector3(0, 1, 0),
      xAxis: new THREE.Vector3(1, 0, 0), zAxis: new THREE.Vector3(0, 0, 1),
      halfX: 50, halfZ: 50
    };

    const startBtn = document.getElementById('start');
    const previewBtn = document.getElementById('preview');
    const hintEl = document.getElementById('hint');

    startBtn.addEventListener('click', () => init(false));
    previewBtn.addEventListener('click', () => init(true));

    // Hide AR button if WebXR / immersive-ar isn't available; preview still works.
    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-ar').then(ok => {
        if (!ok) startBtn.style.display = 'none';
      }).catch(() => { startBtn.style.display = 'none'; });
    } else {
      startBtn.style.display = 'none';
    }

    /* ---------- FIRE BALL ---------- */
    const NOISE_GLSL = `
      vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
      vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){
        const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
        vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
        i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
        float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.0*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
        vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
        vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
        return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
      }
      float fbm(vec3 p){ float a=0.0,w=0.5; for(int i=0;i<5;i++){ a+=w*snoise(p); p*=2.02; w*=0.5;} return a; }
    `;

    function makeFireBall() {
      const group = new THREE.Group();

      // Animated fire core
      const coreMat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uHeat: { value: 1.0 } },
        vertexShader: `
          varying vec3 vPos; varying vec3 vN;
          void main(){ vPos=position; vN=normal;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: NOISE_GLSL + `
          uniform float uTime, uHeat; varying vec3 vPos; varying vec3 vN;
          void main(){
            vec3 q = vPos*4.0;
            q.y -= uTime*1.6;                          // flames lick upward
            float n = fbm(q + vec3(0.0, uTime*0.4, 0.0));
            float n2 = fbm(vPos*8.0 + uTime*0.8);
            float heat = (n*0.6 + n2*0.4)*0.5 + 0.6;
            heat = clamp(heat*uHeat, 0.0, 1.6);
            // fire gradient: deep red -> orange -> golden yellow (no blown-out white)
            vec3 col = vec3(0.30,0.015,0.0);
            col = mix(col, vec3(0.95,0.16,0.0), smoothstep(0.30,0.72,heat));
            col = mix(col, vec3(1.0,0.52,0.05), smoothstep(0.68,1.05,heat));
            col = mix(col, vec3(1.0,0.80,0.28), smoothstep(1.05,1.50,heat));
            gl_FragColor = vec4(col*1.7, 1.0);
          }`,
      });
      ballCore = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 5), coreMat);
      group.add(ballCore);

      // Molten core glowing through the flames (amber, not white)
      ballHot = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      group.add(ballHot);

      // Additive fresnel glow halo
      const glowMat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        transparent: true, blending: THREE.AdditiveBlending,
        side: THREE.BackSide, depthWrite: false,
        vertexShader: `
          varying vec3 vWN; varying vec3 vWP;
          void main(){ vWN=normalize(mat3(modelMatrix)*normal);
            vec4 wp=modelMatrix*vec4(position,1.0); vWP=wp.xyz;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `
          uniform float uTime; varying vec3 vWN; varying vec3 vWP;
          void main(){
            float f=pow(1.0-max(dot(normalize(vWN),normalize(cameraPosition-vWP)),0.0),2.2);
            float pulse=0.85+0.15*sin(uTime*9.0);
            gl_FragColor=vec4(vec3(1.0,0.45,0.08)*f*pulse, f);
          }`,
      });
      ballGlow = new THREE.Mesh(new THREE.IcosahedronGeometry(0.17, 3), glowMat);
      group.add(ballGlow);

      ballLight = new THREE.PointLight(0xff5500, 5, 7, 2);
      group.add(ballLight);

      group.position.copy(homePos);
      return group;
    }

    /* ---------- INIT ---------- */
    async function init(preview) {
      isPreview = preview;
      startBtn.style.display = 'none';
      previewBtn.style.display = 'none';

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 100);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: !preview });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.setClearColor(0x000000, preview ? 1 : 0); // opaque for preview, transparent for AR passthrough
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0x404050, 0.7));
      scene.add(new THREE.HemisphereLight(0xffeedd, 0x202030, 0.5));

      ball = makeFireBall();
      scene.add(ball);
      embers = new EmberSystem(700);

      if (preview) initPreview();
      else await initXR();

      lastTime = performance.now();
      renderer.setAnimationLoop(animate);
    }

    /* ---------- AR ---------- */
    async function initXR() {
      hintEl.textContent = 'Hold a trigger to attract the fire — release to bounce it off your real floor & walls 🔥';
      renderer.xr.enabled = true;
      colliders = [floorCollider]; // until real planes arrive
      try {
        xrSession = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['hand-tracking', 'plane-detection', 'mesh-detection']
        });
        await renderer.xr.setSession(xrSession);
        xrSession.addEventListener('end', () => location.reload());

        scene.add(renderer.xr.getControllerGrip(0), renderer.xr.getControllerGrip(1));
        controller1 = renderer.xr.getController(0);
        controller2 = renderer.xr.getController(1);
        scene.add(controller1, controller2);

        const addPointer = (c) => {
          const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-0.4)]);
          c.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xff7700 })));
        };
        addPointer(controller1); addPointer(controller2);

        controller1.addEventListener('selectstart', () => grab(controller1));
        controller1.addEventListener('selectend', release);
        controller2.addEventListener('selectstart', () => grab(controller2));
        controller2.addEventListener('selectend', release);
      } catch (e) {
        alert('Failed to start AR session: ' + e.message);
        location.reload();
      }
    }

    /* ---------- PREVIEW (browser, no headset) ---------- */
    let camYaw = 0, camPitch = 0, dragging = false, lastX = 0, lastY = 0, demoT = 0;
    function initPreview() {
      hintEl.textContent = 'Preview mode — drag to look around. (Open on a Quest for the real AR experience.)';
      // floor grid + faint wireframe "room" so you can see it bounce off floor & walls
      const grid = new THREE.GridHelper(10, 20, 0xff6600, 0x331100);
      grid.material.opacity = 0.35; grid.material.transparent = true;
      scene.add(grid);
      const room = new THREE.Mesh(
        new THREE.BoxGeometry(5, 3, 4),
        new THREE.MeshBasicMaterial({ color: 0xff6600, wireframe: true, transparent: true, opacity: 0.12 })
      );
      room.position.set(0, 1.5, -1.5);
      scene.add(room);

      // matching colliders: floor, ceiling, 4 walls (room spans x[-2.5,2.5] y[0,3] z[-3.5,0.5])
      const wall = (px, py, pz, nx, ny, nz, ax, ay, az, hx, hz) => ({
        point: new THREE.Vector3(px, py, pz), normal: new THREE.Vector3(nx, ny, nz),
        xAxis: new THREE.Vector3(ax, ay, az),
        zAxis: new THREE.Vector3(nx, ny, nz).cross(new THREE.Vector3(ax, ay, az)).normalize(),
        halfX: hx, halfZ: hz
      });
      colliders = [
        wall(0, 0, -1.5, 0, 1, 0, 1, 0, 0, 2.5, 2.5),   // floor
        wall(0, 3, -1.5, 0, -1, 0, 1, 0, 0, 2.5, 2.5),  // ceiling
        wall(0, 1.5, -3.5, 0, 0, 1, 1, 0, 0, 2.5, 1.5), // back wall
        wall(0, 1.5, 0.5, 0, 0, -1, 1, 0, 0, 2.5, 1.5), // front wall
        wall(-2.5, 1.5, -1.5, 1, 0, 0, 0, 0, 1, 2.5, 1.5), // left wall
        wall(2.5, 1.5, -1.5, -1, 0, 0, 0, 0, 1, 2.5, 1.5)  // right wall
      ];

      camera.position.set(0, 1.6, 0);
      updatePreviewCam();

      const el = renderer.domElement;
      el.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
      addEventListener('pointerup', () => dragging = false);
      addEventListener('pointermove', e => {
        if (!dragging) return;
        camYaw   -= (e.clientX - lastX) * 0.005;
        camPitch -= (e.clientY - lastY) * 0.005;
        camPitch = Math.max(-1.2, Math.min(1.2, camPitch));
        lastX = e.clientX; lastY = e.clientY;
        updatePreviewCam();
      });
    }
    function updatePreviewCam() {
      camera.position.set(0, 1.6, 0);
      const dir = new THREE.Vector3(
        Math.sin(camYaw) * Math.cos(camPitch),
        Math.sin(camPitch),
        -Math.cos(camYaw) * Math.cos(camPitch)
      );
      camera.lookAt(camera.position.clone().add(dir));
    }

    /* ---------- INTERACTION ---------- */
    // throw physics: we track the controller's velocity so a flick of the arm
    // throws the ball; the orbit adds spin/tangential momentum on top.
    const ctrlVel = new THREE.Vector3();
    const ctrlPrev = new THREE.Vector3();
    const orbitTangent = new THREE.Vector3();
    const _hand = new THREE.Vector3();
    const _v = new THREE.Vector3();
    let ctrlHasPrev = false;

    function grab(controller) {
      mode = 'attracted';
      targetController = controller;
      ctrlVel.set(0, 0, 0);
      ctrlHasPrev = false;
    }
    function release() {
      if (mode !== 'attracted') return;
      mode = 'free';
      // ARM THROW dominates: your hand's release velocity, amplified...
      velocity.copy(ctrlVel).multiplyScalar(2.0);
      // ...plus the orbit's tangential momentum (the spin) layered on top
      velocity.addScaledVector(orbitTangent, 2.2);
      velocity.y += 0.8;                 // slight lift so it arcs
      const maxS = 12;
      if (velocity.length() > maxS) velocity.setLength(maxS);
      flameBurst(ball.position, 18, true);
    }

    /* ---------- FLAME JETS ---------- */
    // A flame jet: a head that shoots outward (flames rise + drift) trailing a
    // tapered, flame-coloured tube behind it. It spreads — it does NOT coil.
    const FLAME_VERT = `
      varying float vT; uniform float uTime, uRadius;
      void main(){
        vT = uv.x;                                   // 0 = head, 1 = tail
        float taper = mix(1.3, 0.06, uv.x);          // fat near head, thin at tail
        vec3 center = position - normal * uRadius;   // tube centre-line
        vec3 p = center + normal * (uRadius * taper);
        p += normal * sin(uTime*18.0 + uv.x*34.0) * uRadius * 0.45; // flame flicker/wiggle
        gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
      }`;
    const FLAME_FRAG = `
      varying float vT; uniform float uTime, uOpacity, uSeed;
      void main(){
        float t = vT;
        // hottest is a warm yellow (only a tiny near-white speck at the very tip)
        vec3 yellow = vec3(1.0, 0.78, 0.30);
        vec3 orange = vec3(1.0, 0.40, 0.05);
        vec3 red    = vec3(0.80, 0.13, 0.0);
        vec3 dark   = vec3(0.28, 0.02, 0.0);
        vec3 col = mix(yellow, orange, smoothstep(0.0, 0.30, t));
        col = mix(col, red,  smoothstep(0.28, 0.65, t));
        col = mix(col, dark, smoothstep(0.62, 1.0, t));
        col += vec3(0.15) * (1.0 - smoothstep(0.0, 0.06, t)); // faint hot speck at the tip
        float flick = 0.7 + 0.3*sin(uTime*26.0 + uSeed + t*42.0);
        float alpha = uOpacity * pow(1.0 - t, 1.3) * flick;
        gl_FragColor = vec4(col * (1.45 - t*0.9), alpha);
      }`;

    class FlameJet {
      constructor(origin, dir, opts) {
        opts = opts || {};
        this.dir = dir.clone().normalize();
        this.speed = opts.speed != null ? opts.speed : (1.4 + Math.random() * 1.2);
        this.maxPoints = opts.maxPoints || 22;
        this.radius = opts.radius != null ? opts.radius : (0.03 + Math.random() * 0.015);
        this.fade = opts.fade != null ? opts.fade : (0.016 + Math.random() * 0.012);
        this.buoyancy = opts.buoyancy != null ? opts.buoyancy : 0.7;
        this.opacity = 1; this.age = 0; this.emberAcc = 0;
        this.points = [origin.clone(), origin.clone().addScaledVector(this.dir, 0.002)];
        // two perpendicular axes for layered, serpentine meander (a flowing snake of fire, not a coil)
        this.axis = new THREE.Vector3().crossVectors(this.dir, new THREE.Vector3(0, 1, 0));
        if (this.axis.lengthSq() < 1e-4) this.axis.set(1, 0, 0);
        this.axis.normalize();
        this.axis2 = new THREE.Vector3().crossVectors(this.dir, this.axis).normalize();
        this.curl = (Math.random() - 0.5) * 1.6;
        this.f1 = 3 + Math.random() * 4;  this.a1 = 4 + Math.random() * 5; this.p1 = Math.random() * 6.28;
        this.f2 = 2 + Math.random() * 3;  this.a2 = 3 + Math.random() * 4; this.p2 = Math.random() * 6.28;
        this.material = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uOpacity: { value: 1 }, uRadius: { value: this.radius }, uSeed: { value: Math.random() * 6.283 } },
          vertexShader: FLAME_VERT, fragmentShader: FLAME_FRAG,
          transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });
        this.curve = new THREE.CatmullRomCurve3(this.points);
        this.mesh = new THREE.Mesh(this._geo(), this.material);
        scene.add(this.mesh);
      }
      _geo() { return new THREE.TubeGeometry(this.curve, Math.max(2, this.points.length - 1), this.radius, 6, false); }
      update(delta) {
        this.age += delta;
        // steer the head: layered serpentine meander on two axes + rising buoyancy
        this.dir.applyAxisAngle(this.axis, (this.curl + Math.sin(this.age * this.f1 + this.p1) * this.a1) * delta);
        this.dir.applyAxisAngle(this.axis2, (Math.sin(this.age * this.f2 + this.p2) * this.a2) * delta);
        this.dir.y += this.buoyancy * delta;        // flames rise as they slow
        this.dir.normalize();
        const sp = this.speed * (1 + Math.sin(this.age * 6) * 0.25);
        this.points[0].addScaledVector(this.dir, sp * delta);
        // trailing segments lag behind the head -> stretched, spreading streak
        const a = 1 - Math.exp(-14 * delta);
        for (let i = 1; i < this.points.length; i++) this.points[i].lerp(this.points[i - 1], a);
        if (this.points.length < this.maxPoints) this.points.push(this.points[this.points.length - 1].clone());
        // shed embers along the flame's path
        this.emberAcc += delta;
        if (this.emberAcc > 0.06 && this.opacity > 0.3) { this.emberAcc = 0; spawnEmber(this.points[0], 0.2); }
        this.speed *= Math.max(0, 1 - 1.4 * delta);  // travel further (less drag) -> spreads more
        this.buoyancy += 0.6 * delta;                // rise more as it ages
        this.opacity -= this.fade * delta * 60;
        this.curve.points = this.points;
        this.mesh.geometry.dispose();
        this.mesh.geometry = this._geo();
        this.material.uniforms.uTime.value += delta;
        this.material.uniforms.uOpacity.value = Math.max(0, this.opacity);
        return this.opacity > 0;
      }
      dispose() { scene.remove(this.mesh); this.mesh.geometry.dispose(); this.material.dispose(); }
    }

    function randDir() {
      const u = Math.random() * 2 - 1, a = Math.random() * 6.2831853, s = Math.sqrt(Math.max(0, 1 - u * u));
      return new THREE.Vector3(s * Math.cos(a), u, s * Math.sin(a));
    }
    // Burst of flames firing out in ALL directions (release / wall & floor impacts)
    function flameBurst(pos, count, big) {
      for (let i = 0; i < count; i++) {
        if (flames.length > 80) break;
        flames.push(new FlameJet(pos, randDir(), big
          ? { speed: 2.2 + Math.random() * 1.6, maxPoints: 26, radius: 0.04 + Math.random() * 0.02, fade: 0.013 }
          : { speed: 1.5 + Math.random() * 1.2, maxPoints: 20, radius: 0.03 + Math.random() * 0.015, fade: 0.018 }));
      }
      emberBurst(pos, big ? 26 : 14);   // every impact showers embers
    }
    // Continuous licking flames so the ball is always visibly ablaze (rise upward)
    let emitAcc = 0;
    function emitFlames(pos, delta) {
      emitAcc += delta;
      while (emitAcc > 0.045) {
        emitAcc -= 0.045;
        if (flames.length > 55) break;
        const d = randDir(); d.y = Math.abs(d.y) * 0.5 + 0.5; d.normalize();
        flames.push(new FlameJet(pos, d, { speed: 0.8 + Math.random() * 0.6, maxPoints: 12, radius: 0.02 + Math.random() * 0.012, fade: 0.03 + Math.random() * 0.02, buoyancy: 1.3 }));
        if (Math.random() < 0.6) spawnEmber(pos, 0.5);   // ball constantly sheds embers
      }
    }

    /* ---------- EMBERS ---------- */
    // A GPU-rendered pool of glowing embers that rise then fall under gravity and fade.
    class EmberSystem {
      constructor(max) {
        this.max = max; this.cursor = 0;
        this.pos = new Float32Array(max * 3);
        this.col = new Float32Array(max * 3);
        this.life = new Float32Array(max);   // 1 -> 0
        this.size = new Float32Array(max);
        this.vel = []; for (let i = 0; i < max; i++) { this.vel.push(new THREE.Vector3()); this.pos[i * 3 + 1] = -9999; }
        this.maxLife = new Float32Array(max);
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
        g.setAttribute('aColor', new THREE.BufferAttribute(this.col, 3));
        g.setAttribute('aLife', new THREE.BufferAttribute(this.life, 1));
        g.setAttribute('aSize', new THREE.BufferAttribute(this.size, 1));
        this.geo = g;
        this.mat = new THREE.ShaderMaterial({
          uniforms: { uScale: { value: 650.0 } },
          transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
          vertexShader: `
            uniform float uScale;
            attribute vec3 aColor; attribute float aLife; attribute float aSize;
            varying vec3 vColor; varying float vLife;
            void main(){ vColor=aColor; vLife=aLife;
              vec4 mv = modelViewMatrix * vec4(position,1.0);
              gl_PointSize = clamp(aSize * (uScale / -mv.z), 1.0, 60.0);
              gl_Position = projectionMatrix * mv; }`,
          fragmentShader: `
            varying vec3 vColor; varying float vLife;
            void main(){ if(vLife<=0.0) discard;
              vec2 d = gl_PointCoord - 0.5; float r = length(d);
              if(r>0.5) discard;
              float a = smoothstep(0.5,0.0,r) * vLife;
              gl_FragColor = vec4(vColor * (0.7 + vLife*0.6), a); }`
        });
        this.points = new THREE.Points(g, this.mat);
        this.points.frustumCulled = false;
        scene.add(this.points);
      }
      spawn(p, v, color, life, size) {
        const i = this.cursor; this.cursor = (this.cursor + 1) % this.max;
        this.pos[i*3] = p.x; this.pos[i*3+1] = p.y; this.pos[i*3+2] = p.z;
        this.vel[i].copy(v);
        this.col[i*3] = color.r; this.col[i*3+1] = color.g; this.col[i*3+2] = color.b;
        this.life[i] = 1; this.maxLife[i] = life; this.size[i] = size;
      }
      update(delta) {
        for (let i = 0; i < this.max; i++) {
          if (this.life[i] <= 0) continue;
          const v = this.vel[i];
          v.y -= 2.2 * delta;                    // gravity -> embers drop
          v.multiplyScalar(Math.max(0, 1 - 0.5 * delta));
          this.pos[i*3] += v.x*delta; this.pos[i*3+1] += v.y*delta; this.pos[i*3+2] += v.z*delta;
          this.life[i] = Math.max(0, this.life[i] - delta / this.maxLife[i]);
        }
        this.geo.attributes.position.needsUpdate = true;
        this.geo.attributes.aLife.needsUpdate = true;
        this.geo.attributes.aColor.needsUpdate = true;
        this.geo.attributes.aSize.needsUpdate = true;
      }
    }
    let embers = null;
    const _ec = new THREE.Color();
    // one ember: small upward kick, then gravity drags it down as it cools & fades
    function spawnEmber(pos, up) {
      if (!embers) return;
      _ev.set((Math.random()-0.5)*0.7, (up||0.4) + Math.random()*0.7, (Math.random()-0.5)*0.7);
      _ec.setHSL(0.04 + Math.random()*0.06, 1.0, 0.5 + Math.random()*0.08); // amber/orange, never white
      embers.spawn(pos, _ev, _ec, 0.9 + Math.random()*1.3, 0.018 + Math.random()*0.03);
    }
    function emberBurst(pos, n) { for (let i = 0; i < n; i++) spawnEmber(pos, 0.6 + Math.random()*1.2); }
    const _ev = new THREE.Vector3();

    /* ---------- REAL-WORLD PLANES + COLLISION ---------- */
    // Rebuild colliders from the headset's detected real-world planes each frame.
    function updatePlanes(frame) {
      const ref = renderer.xr.getReferenceSpace();
      if (!ref || !frame.detectedPlanes) return; // feature unsupported -> keep fallback floor
      const list = [floorCollider];
      frame.detectedPlanes.forEach(plane => {
        const pose = frame.getPose(plane.planeSpace, ref);
        if (!pose) return;
        _m.fromArray(pose.transform.matrix);
        const e = _m.elements;
        const point = new THREE.Vector3(e[12], e[13], e[14]);
        const xAxis = new THREE.Vector3(e[0], e[1], e[2]).normalize();   // plane local X
        const normal = new THREE.Vector3(e[4], e[5], e[6]).normalize();  // plane local Y (surface normal)
        const zAxis = new THREE.Vector3(e[8], e[9], e[10]).normalize();  // plane local Z
        let hx = 0, hz = 0;
        if (plane.polygon) for (const p of plane.polygon) { hx = Math.max(hx, Math.abs(p.x)); hz = Math.max(hz, Math.abs(p.z)); }
        list.push({ point, normal, xAxis, zAxis, halfX: hx || 2, halfZ: hz || 2 });
      });
      colliders = list;
    }

    // Reflect the ball off any surface it hits; returns the surface normal (or null).
    function collide(pos, vel, radius) {
      for (const c of colliders) {
        _a.subVectors(pos, c.point);
        _n.copy(c.normal);
        let d = _a.dot(_n);
        if (d < 0) { _n.negate(); d = -d; }        // make the normal face the ball
        if (d > radius || d < -radius * 4) continue; // not touching this surface
        const px = _a.dot(c.xAxis), pz = _a.dot(c.zAxis);
        if (Math.abs(px) > c.halfX + radius || Math.abs(pz) > c.halfZ + radius) continue; // off the edge
        const vn = vel.dot(_n);
        if (vn < 0) {
          vel.addScaledVector(_n, -1.6 * vn); // bounce, restitution 0.6
          vel.multiplyScalar(0.82);           // friction
          pos.addScaledVector(_n, radius - d); // push out of surface
          flameBurst(pos, 12, false);
          return _n.clone();
        }
      }
      return null;
    }

    /* ---------- LOOP ---------- */
    let lastTime = performance.now();
    function animate(time, frame) {
      const now = performance.now();
      const delta = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      const t = now / 1000;

      // animate fire shaders + flickering light
      ballCore.material.uniforms.uTime.value = t;
      ballGlow.material.uniforms.uTime.value = t;
      ballLight.intensity = 4 + Math.sin(t * 25) * 0.8 + Math.sin(t * 11) * 0.6;

      // pull real-world floor/wall geometry from the headset
      if (!isPreview && frame) updatePlanes(frame);

      // Preview: scripted demo so you can see all the visuals hands-free
      if (isPreview) {
        demoT += delta;
        if (mode === 'idle' && demoT > 1.5) { orbitAngle = 0; mode = 'attracted'; targetController = null; }
        else if (mode === 'attracted' && demoT > 4.0) {
          // simulate an arm-throw in a varied direction so the throw mechanic is visible
          ctrlVel.set((Math.random() - 0.5) * 5, 1.2 + Math.random() * 1.5, -2 - Math.random() * 2.5);
          release(); demoT = 0;
        }
      }

      if (mode === 'attracted') {
        orbitAngle += 6 * delta;
        // anchor: real controller in AR, or a point in front of camera in preview
        let anchor;
        if (targetController) {
          anchor = targetController.getWorldPosition(_hand);
          // track the controller's velocity (smoothed) so we can throw with the arm
          if (ctrlHasPrev) {
            _v.subVectors(anchor, ctrlPrev).divideScalar(Math.max(delta, 1e-3));
            ctrlVel.lerp(_v, 1 - Math.exp(-18 * delta));
          }
          ctrlPrev.copy(anchor); ctrlHasPrev = true;
        } else { anchor = tempVec.copy(homePos); }
        const r = 0.32;
        const desired = new THREE.Vector3(
          anchor.x + Math.cos(orbitAngle) * r,
          anchor.y + 0.05 + Math.sin(orbitAngle * 1.7) * 0.12,
          anchor.z + Math.sin(orbitAngle) * r
        );
        // snappy magnetic pull (frame-rate independent)
        ball.position.lerp(desired, 1 - Math.exp(-12 * delta));
        // orbit's tangential direction (for throw spin) scaled by orbit speed * radius
        orbitTangent.set(-Math.sin(orbitAngle), 0.12, Math.cos(orbitAngle)).normalize();
        ballCore.material.uniforms.uHeat.value = 1.5; // hotter while charging
      } else if (mode === 'free') {
        ballCore.material.uniforms.uHeat.value = 1.1;
        velocity.y -= 9.8 * delta;
        ball.position.addScaledVector(velocity, delta);
        const hit = collide(ball.position, velocity, ballRadius); // bounce off real floor/walls
        if (hit && hit.y > 0.5 && velocity.length() < 1.2) {      // resting on a floor -> idle
          mode = 'idle'; idleTime = 0; velocity.set(0, 0, 0);
        }
        if (ball.position.y < -3) {                                // safety: escaped the room
          mode = 'idle'; idleTime = 0; velocity.set(0, 0, 0); ball.position.copy(homePos);
        }
      } else { // idle: gently bob & drift back home
        ballCore.material.uniforms.uHeat.value = 1.0;
        idleTime += delta;
        const target = tempVec.copy(homePos); target.y += Math.sin(idleTime * 1.5) * 0.04;
        ball.position.lerp(target, 1 - Math.exp(-3 * delta));
      }

      // the ball is always ablaze: continuously emit licking flames from it
      emitFlames(ball.position, delta);

      // pulse the white-hot core
      ballHot.material.opacity = 0.45 + Math.sin(t * 20) * 0.1;

      for (let i = flames.length - 1; i >= 0; i--) {
        if (!flames[i].update(delta)) { flames[i].dispose(); flames.splice(i, 1); }
      }
      embers.update(delta);

      renderer.render(scene, camera);
    }

    addEventListener('resize', () => {
      if (!camera) return;
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
