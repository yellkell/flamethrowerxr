<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flamethrower XR - Pass-through</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }
    #ui { position:absolute; top:15px; left:15px; color:#ffaa00; font-family:sans-serif; text-shadow:0 0 10px #ff5500; z-index:10; }
    #start { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:15px 30px; font-size:18px; background:#ff5500; color:#000; border:none; border-radius:8px; cursor:pointer; z-index:100; }
  </style>
</head>
<body>
  <div id="ui">FLAMETHROWER XR 🔥🌀</div>
  <button id="start">ENTER AR PASS-THROUGH</button>

  <script>
    let scene, camera, renderer, xrSession, controller1, controller2;
    let ball, velocity = new THREE.Vector3();
    let isAttracted = false, orbitAngle = 0, targetHand = null;
    const spirals = [];
    const tempVec = new THREE.Vector3();

    const startBtn = document.getElementById('start');
    startBtn.addEventListener('click', initXR);

    async function initXR() {
      if (!navigator.xr) return alert("WebXR not supported");
      startBtn.style.display = 'none';

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 50);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Passthrough requires transparent renderer + black background
      renderer.setClearColor(0x000000, 0);

      // Lights
      scene.add(new THREE.AmbientLight(0x404040, 0.6));
      const sun = new THREE.PointLight(0xffddaa, 1.2, 0);
      scene.add(sun);

      // Fiery Ball
      const ballGeo = new THREE.SphereGeometry(0.1, 32, 32);
      const ballMat = new THREE.MeshPhongMaterial({ color: 0xff5500, emissive: 0xff8800, emissiveIntensity: 5, shininess: 90 });
      ball = new THREE.Mesh(ballGeo, ballMat);
      ball.position.set(0, 1.2, -1.5);
      scene.add(ball);

      const ballLight = new THREE.PointLight(0xff5500, 4, 6);
      ball.add(ballLight);

      // XR Session (Immersive AR for passthrough)
      try {
        xrSession = await navigator.xr.requestSession("immersive-ar", {
          requiredFeatures: ["local-floor"],
          optionalFeatures: ["hand-tracking"]
        });

        renderer.xr.setSession(xrSession);

        xrSession.addEventListener('end', () => location.reload());

        // Controllers / Hands
        const controllerGrip1 = renderer.xr.getControllerGrip(0);
        const controllerGrip2 = renderer.xr.getControllerGrip(1);
        scene.add(controllerGrip1, controllerGrip2);

        controller1 = renderer.xr.getController(0);
        controller2 = renderer.xr.getController(1);
        scene.add(controller1, controller2);

        // Button events on controllers
        controller1.addEventListener('selectstart', () => startOrbit('left'));
        controller1.addEventListener('selectend', () => endOrbit());
        controller2.addEventListener('selectstart', () => startOrbit('right'));
        controller2.addEventListener('selectend', () => endOrbit());

      } catch (e) {
        alert("Failed to start AR session: " + e.message);
      }

      animate();
    }

    function startOrbit(hand) {
      isAttracted = true;
      targetHand = hand;
    }

    function endOrbit() {
      if (!isAttracted) return;
      isAttracted = false;
      // Release with tangential velocity
      velocity.set(
        Math.cos(orbitAngle) * 5,
        2 + Math.random() * 2,
        Math.sin(orbitAngle) * 5 - 3
      );
      spawnSpirals(5, ball.position.clone());
    }

    class SnakeSpiral {
      constructor(startPos) {
        this.points = [startPos.clone()];
        this.angle = Math.random() * Math.PI * 2;
        this.angleSpeed = (0.18 + Math.random() * 0.35) * (Math.random() < 0.5 ? 1 : -1);
        this.maxPoints = 70;
        this.opacity = 1.0;
        this.hueShift = Math.random() * 0.18;

        this.material = new THREE.ShaderMaterial({
          uniforms: { uTime: {value:0}, uOpacity:{value:1}, uHueShift:{value:this.hueShift} },
          vertexShader: `varying vec2 vUv; uniform float uTime; void main(){ vUv=uv; vec3 p=position; p += normal * sin(uTime*12.0 + position.y*22.0)*0.009; gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0); }`,
          fragmentShader: `
            varying vec2 vUv; uniform float uTime, uOpacity, uHueShift;
            vec3 hslToRgb(float h,float s,float l){ /* same hsl function as before */
              vec3 rgb=vec3(0.); float c=(1.-abs(2.*l-1.))*s, x=c*(1.-abs(mod(h*6.,2.)-1.)), m=l-c*.5;
              if(h<1./6.)rgb=vec3(c,x,0.); else if(h<2./6.)rgb=vec3(x,c,0.); else if(h<3./6.)rgb=vec3(0.,c,x);
              else if(h<4./6.)rgb=vec3(0.,x,c); else if(h<5./6.)rgb=vec3(x,0.,c); else rgb=vec3(c,0.,x);
              return rgb+m;
            }
            void main(){
              float p = vUv.y; float i = pow(p,0.55);
              float f = 0.75 + 0.25*sin(uTime*18.+vUv.y*35.);
              i *= f; float h = 0.04 + uHueShift + (1.-p)*0.13;
              vec3 col = hslToRgb(h,1.,0.58 + i*0.42);
              gl_FragColor = vec4(col * (i*3.8 + 1.6), uOpacity * i * 0.95);
            }
          `,
          transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });

        this.curve = new THREE.CatmullRomCurve3(this.points);
        this.geometry = new THREE.TubeGeometry(this.curve, 32, 0.08, 8, false);
        this.mesh = new THREE.Mesh(this.geometry, this.material);
        scene.add(this.mesh);
      }

      update(delta) {
        if (this.points.length < this.maxPoints) {
          const last = this.points[this.points.length-1];
          this.angle += this.angleSpeed;
          const next = last.clone().add(new THREE.Vector3(
            Math.cos(this.angle)*0.065, -0.012, Math.sin(this.angle)*0.065
          ));
          this.points.push(next);
          this.curve.points = this.points;
          this.mesh.geometry.dispose();
          this.mesh.geometry = new THREE.TubeGeometry(this.curve, 32, 0.08, 8, false);
        }
        this.opacity -= 0.009;
        this.material.uniforms.uTime.value += delta;
        this.material.uniforms.uOpacity.value = Math.max(0, this.opacity);
        return this.opacity > 0;
      }
    }

    function spawnSpirals(count, pos) {
      for (let i = 0; i < count; i++) spirals.push(new SnakeSpiral(pos));
    }

    let lastTime = performance.now();
    function animate() {
      const now = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime = now;

      if (renderer.xr.isPresenting) {
        const referenceSpace = renderer.xr.getReferenceSpace();

        // Simple orbit simulation using controller position
        if (isAttracted && targetHand) {
          const ctrl = targetHand === 'left' ? controller1 : controller2;
          if (ctrl) {
            orbitAngle += 9 * delta;
            const handPos = ctrl.getWorldPosition(tempVec);
            const offset = new THREE.Vector3(
              Math.cos(orbitAngle) * 0.4,
              Math.sin(orbitAngle * 1.4) * 0.1,
              Math.sin(orbitAngle) * 0.4
            );
            ball.position.copy(handPos).add(offset);
          }
        } else {
          velocity.y -= 12 * delta;
          ball.position.addScaledVector(velocity, delta * 2.2);

          // Basic bounces
          if (ball.position.y < 0.15) {
            ball.position.y = 0.15;
            velocity.y *= -0.65;
            spawnSpirals(5, ball.position);
          }
        }

        // Update spirals
        for (let i = spirals.length - 1; i >= 0; i--) {
          if (!spirals[i].update(delta)) {
            scene.remove(spirals[i].mesh);
            spirals.splice(i, 1);
          }
        }
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      if (camera) camera.aspect = window.innerWidth / window.innerHeight;
      if (camera) camera.updateProjectionMatrix();
      if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
