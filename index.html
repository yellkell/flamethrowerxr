<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flame Thrower XR</title>
  <link rel="icon" href="Y.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    html,body { margin:0; height:100%; overflow:hidden; background:#000; touch-action:none; }
    canvas { display:block; }
    #intro-text {
      position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
      color:white; font-family:'Orbitron',sans-serif;
      font-size:clamp(24px,5vw,36px); opacity:0; pointer-events:none;
      text-align:center; line-height:1.5;
      text-shadow:0 0 10px rgba(255,85,0,0.8); z-index:10;
      width:90%; max-width:640px; min-height:3em;
      will-change:transform,opacity,filter;
    }
    /* No letter-spacing animation: CSS puts the spacing as trailing space
       after the last glyph, which text-align:center counts, so animating it
       slides the centered text sideways as it settles. */
    @keyframes textReveal {
      0% { opacity:0; filter:blur(12px) brightness(2); transform:translate(-50%,-40%) scale(0.9); }
      100% { opacity:1; filter:blur(0px) brightness(1); transform:translate(-50%,-50%) scale(1); }
    }
    @keyframes textHide {
      0% { opacity:1; filter:blur(0px) brightness(1); transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0; filter:blur(12px) brightness(0.5); transform:translate(-50%,-60%) scale(1.1); }
    }
    #hint {
      position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
      color:#ffcc66; font-family:'Orbitron',sans-serif; font-size:12px; opacity:.7;
      text-shadow:0 0 8px #ff5500; z-index:10; pointer-events:none; text-align:center;
      width:90%;
    }
    .btn {
      position:absolute; left:50%; transform:translateX(-50%);
      padding:14px 34px; font-size:16px; color:#ffcc88;
      background:rgba(20,8,0,0.55); border:1px solid rgba(255,120,0,0.5);
      border-radius:10px; cursor:pointer; z-index:100;
      font-family:'Orbitron',sans-serif; letter-spacing:2px;
      text-shadow:0 0 10px rgba(255,85,0,0.8);
      box-shadow:0 0 18px rgba(255,85,0,0.25);
    }
    #start   { top:60%; }
    #preview { top:60%; margin-top:90px; font-size:10px; padding:8px 18px; opacity:.65; letter-spacing:1px; }
  </style>
</head>
<body>
  <div id="intro-text">Take your time<br>Flame Thrower</div>
  <button id="start" class="btn">ENTER AR</button>
  <button id="preview" class="btn">DESKTOP PREVIEW</button>
  <div id="hint"></div>

  <script>
    /*
     * Flamethrower XR — a spatial re-imagining of the original 2D flamethrower.
     *
     * The heart of the original's delight is the SnakeSpiral: a head whose TURN
     * RATE oscillates (angle += angleSpeed * (1 + sin(age*flicker)*0.8)), whose
     * speed pulses, that drifts upward, reflects off edges, and drags an elastic
     * follower-chain body behind it, painted as an additive hue-gradient ribbon
     * with a glowing head and shed embers.
     *
     * Here that exact algorithm runs in the 2D TANGENT SPACE of real-world
     * surfaces (WebXR detected planes, or a fallback room). World-up projected
     * into each plane becomes the climb bias — so on walls the snakes writhe
     * UPWARD in a searching manner, on the floor they spread outward hunting,
     * and when a snake reaches the edge of one plane it HOPS onto the adjacent
     * one: fire scatters across your floor, finds your walls, and climbs them.
     */

    let scene, camera, renderer, xrSession;
    let ball, ballCore, ballGlow, ballHot;
    let velocity = new THREE.Vector3();
    let mode = 'idle';            // 'idle' | 'attracted' | 'free'
    let orbitAngle = 0, targetController = null;
    let isPreview = false, idleTime = 0;

    // ignition arc: the room starts near-black, the title hovers mid-room,
    // and the first trigger pull strikes the match and lights the ball
    let lit = false;
    const TINT_START = 0.97, TINT_INTRO = 0.91, TINT_LIT = 0.84;
    let tintLevel = TINT_START;
    let tintMat = null, tintMesh = null;
    let titleMesh = null, titleMat = null, titleTex = null, titleCtx = null;
    let titleT = 0, titleGone = false, titleWhich = 0, titlePhase = 'in', titleHold = 0;
    const homePos = new THREE.Vector3(0, 1.3, -1.0);
    const UP = new THREE.Vector3(0, 1, 0);
    const ballRadius = 0.1;
    const CRUISE_SPEED = 1.0; // the ball never drops below this — perpetual motion

    const snakes = [];
    let surfCount = 0, airCount = 0;
    const MAX_SURF_SNAKES = 30;
    const MAX_AIR_SNAKES = 14;

    let colliders = [];

    // scratch vectors (avoid per-frame allocation)
    const _m = new THREE.Matrix4();
    const _a = new THREE.Vector3();
    const _n = new THREE.Vector3();
    const _w = new THREE.Vector3();
    const _d = new THREE.Vector3();
    const _p = new THREE.Vector3();
    const _v = new THREE.Vector3();
    const _hand = new THREE.Vector3();
    const _cv = new THREE.Vector3();
    const _c = new THREE.Color();
    const tempVec = new THREE.Vector3();

    const startBtn = document.getElementById('start');
    const previewBtn = document.getElementById('preview');
    const hintEl = document.getElementById('hint');
    const introEl = document.getElementById('intro-text');
    startBtn.addEventListener('click', () => init(false));
    previewBtn.addEventListener('click', () => init(true));

    // landing page intro — cycles like the original until a mode is chosen
    let entered = false;
    (function cycleIntro() {
      const reveal = () => {
        introEl.style.animation = 'textReveal 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
      };
      try {
        if (document.fonts && typeof document.fonts.ready?.then === 'function') {
          document.fonts.ready.then(reveal).catch(reveal);
        } else { setTimeout(reveal, 50); }
      } catch (_) { setTimeout(reveal, 50); }
      let which = 0;
      setInterval(() => {
        if (entered) { introEl.style.display = 'none'; return; }
        introEl.style.animation = 'textHide 1.5s cubic-bezier(0.8, 0, 0.2, 1) forwards';
        setTimeout(() => {
          if (entered) return;
          which ^= 1;
          introEl.innerHTML = which === 0
            ? 'Take your time<br>Flame Thrower'
            : 'Pull the trigger<br>to strike the match';
          introEl.style.animation = 'textReveal 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
        }, 1600);
      }, 5500);
    })();

    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-ar').then(ok => {
        if (!ok) startBtn.style.display = 'none';
      }).catch(() => { startBtn.style.display = 'none'; });
    } else {
      startBtn.style.display = 'none';
    }

    /* ================= AUDIO =================
     * Compact spatial echo of the original's sound identity:
     * pentatonic FM bells with combo-stepping on bounces, a soft sub thud,
     * a noise whoosh on throws, and a quick ignite arpeggio on grab. */
    let AC = null, reverb = null, masterBus = null, matchBuf = null;
    const PENT = [164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
    let lastBounceClock = -9, comboStep = 0;

    function initAudio() {
      if (AC) return;
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        masterBus = AC.createGain();
        masterBus.gain.value = 0.9;
        masterBus.connect(AC.destination);
        const len = Math.floor(AC.sampleRate * 1.4);
        const buf = AC.createBuffer(2, len, AC.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = buf.getChannelData(ch);
          for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
        }
        reverb = AC.createConvolver();
        reverb.buffer = buf;
        const rg = AC.createGain();
        rg.gain.value = 0.2;
        reverb.connect(rg);
        rg.connect(masterBus);
        if (AC.state === 'suspended') AC.resume().catch(() => {});
        // recorded match strike — decoded async; matchStrike() falls back to
        // the synthesized version until (or unless) this arrives
        fetch('match_strike.mp3')
          .then(r => r.ok ? r.arrayBuffer() : Promise.reject())
          .then(ab => AC.decodeAudioData(ab))
          .then(buf => { matchBuf = buf; })
          .catch(() => {});
      } catch (e) { AC = null; }
    }

    const _camRight = new THREE.Vector3(), _camPos = new THREE.Vector3(), _toSrc = new THREE.Vector3();
    function panOf(pos) {
      if (!camera) return 0;
      _camRight.setFromMatrixColumn(camera.matrixWorld, 0).normalize();
      _camPos.setFromMatrixPosition(camera.matrixWorld);
      _toSrc.subVectors(pos, _camPos);
      if (_toSrc.lengthSq() < 1e-6) return 0;
      return THREE.MathUtils.clamp(_toSrc.normalize().dot(_camRight), -1, 1);
    }

    // route a gain node out through an optional stereo panner + shared reverb
    function routeOut(g, pan) {
      if (typeof AC.createStereoPanner === 'function') {
        const p = AC.createStereoPanner();
        p.pan.value = THREE.MathUtils.clamp(pan || 0, -1, 1);
        g.connect(p);
        p.connect(masterBus);
      } else {
        g.connect(masterBus);
      }
      if (reverb) g.connect(reverb);
    }

    // 2-op FM bell (3:1 ratio, fast mod-index decay) — the original's bounce voice
    function bell(hz, when, peak, pan) {
      const carrier = AC.createOscillator();
      carrier.type = 'sine';
      carrier.frequency.setValueAtTime(hz, when);
      const mod = AC.createOscillator();
      mod.type = 'sine';
      mod.frequency.setValueAtTime(hz * 3, when);
      const depth = AC.createGain();
      depth.gain.setValueAtTime(hz * 2.2, when);
      depth.gain.exponentialRampToValueAtTime(0.01, when + 0.12);
      mod.connect(depth);
      depth.connect(carrier.frequency);
      const g = AC.createGain();
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(peak, when + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 0.35);
      carrier.connect(g);
      routeOut(g, pan);
      carrier.start(when); mod.start(when);
      carrier.stop(when + 0.45); mod.stop(when + 0.45);
    }

    function makeNoise(seconds, shape) {
      const sr = AC.sampleRate, len = Math.floor(sr * seconds);
      const buf = AC.createBuffer(1, len, sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t = i / len;
        d[i] = (Math.random() * 2 - 1) * (shape ? shape(t) : 1);
      }
      return buf;
    }

    // bounce: pentatonic bell cascade, base note keyed to which surface was hit,
    // combo-stepping when bounces land within half a second of each other
    function bounceSound(pos, normal, speed) {
      if (!AC) return;
      const t = AC.currentTime;
      if (t - lastBounceClock > 0.5) comboStep = 0;
      else comboStep = Math.min(comboStep + 1, 4);
      lastBounceClock = t;
      let base;
      if (normal.y > 0.5) base = 0;          // floor
      else if (normal.y < -0.5) base = 5;    // ceiling
      else base = (normal.x + normal.z) > 0 ? 2 : 3; // walls
      const start = Math.min(PENT.length - 1, base + comboStep);
      const pan = panOf(pos);
      const count = Math.min(6, 3 + Math.floor(speed));
      const PAT = [0, 2, 4, 6, 4, 3];
      const vol = Math.min(0.42, 0.22 + speed * 0.04);
      for (let i = 0; i < count; i++) {
        const idx = Math.min(PENT.length - 1, start + PAT[i]);
        bell(PENT[idx] * (1 + (Math.random() - 0.5) * 0.004), t + i * 0.085, vol * Math.pow(0.85, i), pan);
      }
      // soft sub thud underneath
      const sub = AC.createOscillator();
      sub.type = 'sine';
      const f0 = normal.y > 0.5 ? 48 : 55;
      sub.frequency.setValueAtTime(f0 * 1.35, t);
      sub.frequency.exponentialRampToValueAtTime(f0, t + 0.3);
      const lp = AC.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(100, t);
      lp.frequency.exponentialRampToValueAtTime(40, t + 0.7);
      const sg = AC.createGain();
      sg.gain.setValueAtTime(0, t);
      sg.gain.linearRampToValueAtTime(0.22, t + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
      sub.connect(lp); lp.connect(sg);
      routeOut(sg, pan);
      sub.start(t); sub.stop(t + 0.8);
    }

    function whoosh(pos, strength) {
      if (!AC) return;
      const t = AC.currentTime;
      const src = AC.createBufferSource();
      src.buffer = makeNoise(0.9, v => (v < 0.12 ? v / 0.12 : 1) * Math.pow(1 - v * 0.7, 0.9));
      const bp = AC.createBiquadFilter();
      bp.type = 'bandpass';
      bp.Q.setValueAtTime(0.6, t);
      bp.frequency.setValueAtTime(220, t);
      bp.frequency.exponentialRampToValueAtTime(1300, t + 0.3);
      bp.frequency.exponentialRampToValueAtTime(550, t + 0.85);
      const g = AC.createGain();
      const peak = Math.min(0.5, 0.25 + (strength || 0) * 0.03);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(peak, t + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      src.connect(bp); bp.connect(g);
      routeOut(g, panOf(pos));
      src.start(t);
    }

    function igniteArp(pos) {
      if (!AC) return;
      const t = AC.currentTime;
      const pan = panOf(pos);
      [0, 2, 4].forEach((off, i) => {
        bell(PENT[2 + off], t + i * 0.055, 0.3 - i * 0.05, pan);
      });
    }

    // drawing sound — the original's hold "pluck roll": a JS-scheduled
    // arpeggiator cycling a pentatonic motif while you hold the trigger.
    // Adapted to the room: pitch root tracks the ball's height (drawing up
    // high plays higher) and the pan follows the ball around you live.
    let rollGain = null, rollPan = null, rollTimer = null;
    function startPluckRoll() {
      if (!AC || rollGain) return;
      const t = AC.currentTime;
      rollGain = AC.createGain();
      rollGain.gain.setValueAtTime(0, t);
      rollGain.gain.linearRampToValueAtTime(0.24, t + 0.12);
      if (typeof AC.createStereoPanner === 'function') {
        rollPan = AC.createStereoPanner();
        rollPan.pan.value = panOf(ball.position);
        rollGain.connect(rollPan);
        rollPan.connect(masterBus);
      } else {
        rollGain.connect(masterBus);
      }
      if (reverb) rollGain.connect(reverb);

      // asymmetric motif reads as "played" rather than mechanical
      const PATTERN = [0, 2, 4, 1, 3, 2, 4, 3, 2, 0, 1, 3];
      const arpRate = 0.11;
      let nextTime = t + 0.05;
      let patIdx = 0;
      const myGain = rollGain;
      const tick = () => {
        if (rollGain !== myGain) return; // roll was stopped
        if (rollPan) rollPan.pan.setTargetAtTime(panOf(ball.position), AC.currentTime, 0.08);
        const ahead = AC.currentTime + 0.28;
        while (nextTime < ahead) {
          const h = THREE.MathUtils.clamp(ball.position.y / 2.2, 0, 1);
          const rootIdx = Math.min(PENT.length - 5, Math.floor(h * (PENT.length - 4)));
          const idx = Math.min(PENT.length - 1, rootIdx + PATTERN[patIdx % PATTERN.length]);
          const hz = PENT[idx] * (1 + (Math.random() - 0.5) * 0.004);
          const o = AC.createOscillator();
          o.type = 'triangle';
          o.frequency.setValueAtTime(hz, nextTime);
          const lp = AC.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.setValueAtTime(Math.min(5500, hz * 5 + 700), nextTime);
          lp.Q.setValueAtTime(0.85, nextTime);
          const g = AC.createGain();
          const peak = (patIdx % 4 === 0) ? 0.5 : 0.32; // accent every 4th
          g.gain.setValueAtTime(0, nextTime);
          g.gain.linearRampToValueAtTime(peak, nextTime + 0.003);
          g.gain.exponentialRampToValueAtTime(0.0001, nextTime + 0.22);
          o.connect(lp); lp.connect(g); g.connect(myGain);
          o.start(nextTime); o.stop(nextTime + 0.28);
          nextTime += arpRate;
          patIdx++;
        }
      };
      tick();
      rollTimer = setInterval(tick, 80);
    }
    function stopPluckRoll() {
      if (!rollGain) return;
      const t = AC.currentTime;
      rollGain.gain.cancelScheduledValues(t);
      rollGain.gain.setValueAtTime(rollGain.gain.value, t);
      rollGain.gain.linearRampToValueAtTime(0, t + 0.15);
      const g = rollGain, p = rollPan;
      setTimeout(() => { try { g.disconnect(); if (p) p.disconnect(); } catch (e) {} }, 450);
      clearInterval(rollTimer);
      rollTimer = null; rollGain = null; rollPan = null;
    }

    // match strike: plays the recorded strike if it's loaded, otherwise the
    // original's synthesized four-phase version (scratch, ignition pop,
    // rising flame whoosh, sub-bass body thump)
    function matchStrike() {
      if (!AC) return;
      if (matchBuf) {
        const src = AC.createBufferSource();
        src.buffer = matchBuf;
        const g = AC.createGain();
        g.gain.value = 0.9;
        src.connect(g);
        routeOut(g, 0);
        src.start(AC.currentTime);
        return;
      }
      const t = AC.currentTime;
      const sc = AC.createBufferSource();
      sc.buffer = makeNoise(0.13, p => Math.pow(1 - p, 0.3) * (p < 0.1 ? p / 0.1 : 1));
      const hp = AC.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.setValueAtTime(2500, t);
      const sg = AC.createGain();
      sg.gain.setValueAtTime(0.5, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
      sc.connect(hp); hp.connect(sg);
      routeOut(sg, 0);
      sc.start(t);

      const pop = AC.createOscillator();
      pop.type = 'sine';
      pop.frequency.setValueAtTime(220, t + 0.08);
      pop.frequency.exponentialRampToValueAtTime(60, t + 0.22);
      const pg = AC.createGain();
      pg.gain.setValueAtTime(0, t + 0.08);
      pg.gain.linearRampToValueAtTime(0.55, t + 0.11);
      pg.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      pop.connect(pg);
      routeOut(pg, 0);
      pop.start(t + 0.08); pop.stop(t + 0.38);

      const wh = AC.createBufferSource();
      wh.buffer = makeNoise(1.1, p => (p < 0.15 ? p / 0.15 : 1) * Math.pow(1 - p * 0.6, 0.8));
      const bp = AC.createBiquadFilter();
      bp.type = 'bandpass';
      bp.Q.setValueAtTime(0.6, t + 0.1);
      bp.frequency.setValueAtTime(200, t + 0.1);
      bp.frequency.exponentialRampToValueAtTime(1200, t + 0.45);
      bp.frequency.exponentialRampToValueAtTime(600, t + 1.2);
      const wg = AC.createGain();
      wg.gain.setValueAtTime(0, t + 0.1);
      wg.gain.linearRampToValueAtTime(0.6, t + 0.35);
      wg.gain.exponentialRampToValueAtTime(0.22, t + 1.0);
      wg.gain.exponentialRampToValueAtTime(0.001, t + 1.25);
      wh.connect(bp); bp.connect(wg);
      routeOut(wg, 0);
      wh.start(t + 0.1);

      const body = AC.createOscillator();
      body.type = 'sine';
      body.frequency.setValueAtTime(80, t + 0.09);
      body.frequency.exponentialRampToValueAtTime(40, t + 0.4);
      const bg = AC.createGain();
      bg.gain.setValueAtTime(0, t + 0.09);
      bg.gain.linearRampToValueAtTime(0.45, t + 0.14);
      bg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      body.connect(bg);
      routeOut(bg, 0);
      body.start(t + 0.09); body.stop(t + 0.52);
    }

    function ignite() {
      if (lit) return;
      lit = true;
      matchStrike();
      ballGlow.visible = true;
      ballHot.visible = true;
      for (let i = 0; i < 5; i++) spawnAirFlame(ball.position, true);
      emberBurst(ball.position, 14);
      // set the fire loose — from here on it never rests
      // (in AR the grab on this same trigger press takes over immediately)
      mode = 'free';
      velocity.set(Math.random() - 0.5, 0.3, Math.random() - 0.5)
        .normalize().multiplyScalar(CRUISE_SPEED);
      hintEl.textContent = isPreview
        ? 'Drag to look, click to throw the fire'
        : 'Hold trigger to attract the fire — flick and release to throw';
    }

    /* ================= FIRE BALL ================= */
    const NOISE_GLSL = `
      vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
      vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){
        const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
        vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
        i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
        float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.0*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
        vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
        vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
        return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
      }
      float fbm(vec3 p){ float a=0.0,w=0.5; for(int i=0;i<5;i++){ a+=w*snoise(p); p*=2.02; w*=0.5;} return a; }
    `;

    function makeFireBall() {
      const group = new THREE.Group();
      // bright molten fire core — one noise lookup, no vertex displacement.
      // The palette never bottoms out near black: the dimmest tone is a
      // glowing orange so the ball always reads as lit and hot.
      const coreMat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uHeat: { value: 1.0 } },
        // transparent:true (at alpha 1) moves the core into the transparent
        // pass ABOVE the fullscreen darkness — as an opaque object it was
        // drawn first and the tint painted 84% black over it, which is why
        // the heart of the ball looked dim while the additive effects around
        // it (drawn after the tint) looked perfect
        transparent: true, depthWrite: true,
        vertexShader: `
          varying vec3 vPos;
          void main(){ vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: NOISE_GLSL + `
          uniform float uTime, uHeat; varying vec3 vPos;
          void main(){
            vec3 q = vPos * 5.0;
            q.y -= uTime * 1.6;                 // flames lick upward
            float heat = clamp((fbm(q) * 0.5 + 0.65) * uHeat, 0.0, 1.7);
            vec3 col = vec3(1.0, 0.32, 0.03);                                   // glowing orange floor
            col = mix(col, vec3(1.0, 0.55, 0.08), smoothstep(0.45, 0.85, heat));
            col = mix(col, vec3(1.0, 0.80, 0.28), smoothstep(0.85, 1.25, heat));
            col = mix(col, vec3(1.0, 0.95, 0.65), smoothstep(1.25, 1.65, heat)); // white-hot peaks
            // exposure: dark smoldering ember before ignition, full blaze once lit
            float expo = smoothstep(0.15, 0.7, uHeat);
            gl_FragColor = vec4(col * 1.95 * mix(0.12, 1.0, expo), 1.0);
          }`,
      });
      ballCore = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 3), coreMat);
      ballCore.renderOrder = 1; // above the tint (-1), below the additive layers
      group.add(ballCore);

      ballHot = new THREE.Mesh(
        new THREE.SphereGeometry(0.072, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffdd88, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      ballHot.renderOrder = 2;
      group.add(ballHot);

      // corona: a camera-facing additive glow — a clean radial falloff with a
      // single noise lookup gently rippling the rim. Cheap and bright.
      const coronaMat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uHeat: { value: 1.0 } },
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
        vertexShader: `
          varying vec2 vUv;
          void main(){ vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: NOISE_GLSL + `
          uniform float uTime, uHeat;
          varying vec2 vUv;
          void main(){
            vec2 p = vUv * 2.0 - 1.0;
            p.y -= 0.08;                        // reaches a touch higher than it hangs
            float r = length(p);
            if (r > 1.0) discard;
            float ang = atan(p.y, p.x);
            float ripple = fbm(vec3(cos(ang), sin(ang), uTime * 0.7) * 1.4);
            float maxR = 0.62 + ripple * 0.22;
            float fall = pow(clamp(1.0 - r / maxR, 0.0, 1.0), 1.6);
            float glow = fall * uHeat;
            glow += pow(max(1.0 - r * 2.4, 0.0), 2.0) * 0.9; // white-hot kiss at the centre
            vec3 col = mix(vec3(1.0, 0.36, 0.04), vec3(1.0, 0.82, 0.40), pow(fall, 2.0));
            float flick = 0.9 + 0.1 * sin(uTime * 16.0);
            gl_FragColor = vec4(col * glow * flick, min(glow, 1.2));
          }`,
      });
      ballGlow = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.6), coronaMat);
      ballGlow.renderOrder = 2; // draws after the core so the glow layers over it
      group.add(ballGlow);

      group.position.copy(homePos);
      return group;
    }

    /* ================= PARTICLE POOL (embers + wall-glow residue) =================
     * One GPU point pool. Embers fly with gravity; residue particles sit still on
     * the surface and fade slowly — they are the 3D stand-in for the original
     * canvas's 3%-alpha clear, the painted-light afterglow the snakes leave. */
    class ParticlePool {
      constructor(max) {
        this.max = max; this.cursor = 0;
        this.pos = new Float32Array(max * 3);
        this.vel = new Float32Array(max * 3);
        this.col = new Float32Array(max * 3);
        this.life = new Float32Array(max);
        this.maxLife = new Float32Array(max);
        this.size = new Float32Array(max);
        this.grav = new Float32Array(max);
        for (let i = 0; i < max; i++) this.pos[i * 3 + 1] = -9999;
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
        g.setAttribute('aColor', new THREE.BufferAttribute(this.col, 3));
        g.setAttribute('aLife', new THREE.BufferAttribute(this.life, 1));
        g.setAttribute('aSize', new THREE.BufferAttribute(this.size, 1));
        this.geo = g;
        this.mat = new THREE.ShaderMaterial({
          uniforms: { uScale: { value: 650.0 } },
          transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
          vertexShader: `
            uniform float uScale;
            attribute vec3 aColor; attribute float aLife; attribute float aSize;
            varying vec3 vColor; varying float vLife;
            void main(){ vColor=aColor; vLife=aLife;
              vec4 mv = modelViewMatrix * vec4(position,1.0);
              gl_PointSize = clamp(aSize * (uScale / -mv.z), 1.0, 60.0);
              gl_Position = projectionMatrix * mv; }`,
          fragmentShader: `
            varying vec3 vColor; varying float vLife;
            void main(){ if(vLife<=0.0) discard;
              vec2 d = gl_PointCoord - 0.5; float r = length(d);
              if(r>0.5) discard;
              float a = smoothstep(0.5,0.0,r) * vLife;
              gl_FragColor = vec4(vColor * (0.7 + vLife*0.6), a); }`
        });
        this.points = new THREE.Points(g, this.mat);
        this.points.frustumCulled = false;
      }
      spawn(p, vx, vy, vz, r, g, b, life, size, grav) {
        const i = this.cursor; this.cursor = (this.cursor + 1) % this.max;
        this.pos[i*3] = p.x; this.pos[i*3+1] = p.y; this.pos[i*3+2] = p.z;
        this.vel[i*3] = vx; this.vel[i*3+1] = vy; this.vel[i*3+2] = vz;
        this.col[i*3] = r; this.col[i*3+1] = g; this.col[i*3+2] = b;
        this.life[i] = 1; this.maxLife[i] = life; this.size[i] = size;
        this.grav[i] = grav;
      }
      update(dt) {
        const drag = Math.max(0, 1 - 0.5 * dt);
        for (let i = 0; i < this.max; i++) {
          if (this.life[i] <= 0) continue;
          this.vel[i*3+1] -= this.grav[i] * dt;
          this.vel[i*3] *= drag; this.vel[i*3+1] *= drag; this.vel[i*3+2] *= drag;
          this.pos[i*3] += this.vel[i*3]*dt;
          this.pos[i*3+1] += this.vel[i*3+1]*dt;
          this.pos[i*3+2] += this.vel[i*3+2]*dt;
          this.life[i] = Math.max(0, this.life[i] - dt / this.maxLife[i]);
        }
        this.geo.attributes.position.needsUpdate = true;
        this.geo.attributes.aLife.needsUpdate = true;
        this.geo.attributes.aColor.needsUpdate = true;
        this.geo.attributes.aSize.needsUpdate = true;
      }
    }
    let pool = null;

    function spawnEmber(pos, up) {
      if (!pool) return;
      _c.setHSL(0.04 + Math.random() * 0.06, 1.0, 0.5 + Math.random() * 0.08);
      pool.spawn(pos,
        (Math.random() - 0.5) * 0.7, (up || 0.4) + Math.random() * 0.7, (Math.random() - 0.5) * 0.7,
        _c.r, _c.g, _c.b,
        0.9 + Math.random() * 1.3, 0.018 + Math.random() * 0.03, 2.2);
    }
    function emberBurst(pos, n) { for (let i = 0; i < n; i++) spawnEmber(pos, 0.6 + Math.random() * 1.2); }

    // still, slowly-fading glow left on the surface where a snake has been
    function spawnResidue(pos, normal, hue, size) {
      if (!pool) return;
      _c.setHSL(THREE.MathUtils.euclideanModulo(hue, 360) / 360, 1.0, 0.34);
      _v.copy(pos).addScaledVector(normal, 0.006);
      pool.spawn(_v, 0, 0, 0,
        _c.r * 0.4, _c.g * 0.4, _c.b * 0.4,
        1.6 + Math.random() * 0.8, size * (1.2 + Math.random() * 0.6), 0);
    }

    /* ================= SNAKE RIBBON RENDERING ================= */
    // one shared material for every snake — colors live in a per-vertex vec4
    const SNAKE_MAT = new THREE.ShaderMaterial({
      vertexShader: `
        attribute vec4 aColor; varying vec4 vColor;
        void main(){ vColor=aColor;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `
        varying vec4 vColor;
        void main(){ gl_FragColor = vColor; }`,
      transparent: true, blending: THREE.AdditiveBlending,
      depthWrite: false, side: THREE.DoubleSide
    });

    // intro text hovering above the ball — world-anchored (it does NOT
    // billboard with your head), cycling between the two messages
    function drawTitle(which) {
      const g = titleCtx;
      g.clearRect(0, 0, 1024, 320);
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.shadowColor = 'rgba(255,85,0,0.9)';
      g.fillStyle = '#ffd9a0';
      if (which === 0) {
        g.shadowBlur = 24;
        g.font = '46px Orbitron, sans-serif';
        g.fillText('Take your time', 512, 90);
        g.shadowBlur = 40;
        g.font = '700 92px Orbitron, sans-serif';
        g.fillText('Flame Thrower', 512, 210);
      } else {
        g.shadowBlur = 30;
        g.font = '700 62px Orbitron, sans-serif';
        g.fillText('Pull the trigger', 512, 105);
        g.fillText('to strike the match', 512, 205);
      }
      titleTex.needsUpdate = true;
    }

    function makeTitle() {
      const c = document.createElement('canvas');
      c.width = 1024; c.height = 320;
      titleCtx = c.getContext('2d');
      titleTex = new THREE.CanvasTexture(c);
      drawTitle(0);
      titleMat = new THREE.MeshBasicMaterial({
        map: titleTex, transparent: true, opacity: 0,
        depthWrite: false, side: THREE.DoubleSide
      });
      titleMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.0, 0.625), titleMat);
      titleMesh.position.set(homePos.x, homePos.y + 0.5, homePos.z);
      scene.add(titleMesh);
      // redraw once Orbitron arrives so the texture picks up the real font
      try {
        if (document.fonts && typeof document.fonts.ready?.then === 'function') {
          document.fonts.ready.then(() => { if (!titleGone) drawTitle(titleWhich); }).catch(() => {});
        }
      } catch (_) { }
    }

    function makeGlowTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const g = c.getContext('2d');
      const gr = g.createRadialGradient(32, 32, 0, 32, 32, 32);
      gr.addColorStop(0, 'rgba(255,255,255,1)');
      gr.addColorStop(0.35, 'rgba(255,200,120,0.55)');
      gr.addColorStop(1, 'rgba(255,120,0,0)');
      g.fillStyle = gr;
      g.fillRect(0, 0, 64, 64);
      return new THREE.CanvasTexture(c);
    }
    let glowTex = null;

    function planePoint(plane, u, v, out) {
      return out.copy(plane.point)
        .addScaledVector(plane.xAxis, u)
        .addScaledVector(plane.zAxis, v);
    }

    /* ================= FIRE SNAKE =================
     * The original SnakeSpiral, verbatim in spirit, running in a surface's
     * (u,v) tangent space. Head writhes & searches; body is a follower chain;
     * rendered as a surface-hugging additive ribbon with the original's
     * hue gradient and a glowing head sprite. Air snakes use a synthetic
     * vertical plane anchored at the ball — they're the licking tongues. */
    class FireSnake {
      constructor(plane, u, v, opts = {}) {
        this.plane = plane;
        this.u = u; this.v = v;
        this.spawnU = u; this.spawnV = v;
        this.air = !!opts.air;
        this.driven = !!opts.driven; // head pinned to the ball — sparkler drawing
        this.target = null;
        this.max = opts.maxPoints || 72;
        const boost = opts.boost || 0;

        // --- the original spiral's soul, retuned from px/frame to m/s ---
        this.angleSpeed = (2.5 + Math.random() * 4.5) * (Math.random() < 0.5 ? 1 : -1);
        this.flicker = 9 + Math.random() * 16;       // turn-rate pulse freq (rad/s)
        this.spread = 0.4 + Math.random() * 0.5;     // speed pulse depth
        this.speed = (this.air ? 0.40 + Math.random() * 0.25
                               : 0.62 + Math.random() * 0.38) * (1 + boost * 0.3);
        this.climb = opts.climb != null ? opts.climb : (0.5 + Math.random() * 0.25);
        this.fade = opts.fade || (0.22 + Math.random() * 0.13); // opacity/sec
        this.hue = 10 + Math.random() * 48;
        this.width = opts.width || (0.045 + Math.random() * 0.03 + boost * 0.012);
        this.lift = 0.012 + Math.random() * 0.008;   // hover off the surface
        this.opacity = 1;
        this.age = 0;
        this.hops = 0;
        this.ph1 = Math.random() * 6.283;
        this.ph2 = Math.random() * 6.283;
        this.ph3 = Math.random() * 6.283;
        this.growAcc = 0; this.resAcc = 0;

        this._computeUp();
        this.angle = opts.angle != null ? opts.angle : Math.random() * Math.PI * 2;

        // follower chain in world space (head first)
        planePoint(plane, u, v, _w);
        this.pts = [_w.clone(), _w.clone()];
        this.nrm = [plane.normal.clone(), plane.normal.clone()];

        // pre-allocated ribbon strip: max*2 verts, updated in place each frame
        const geo = new THREE.BufferGeometry();
        this.posAttr = new THREE.BufferAttribute(new Float32Array(this.max * 2 * 3), 3);
        this.colAttr = new THREE.BufferAttribute(new Float32Array(this.max * 2 * 4), 4);
        this.posAttr.setUsage(THREE.DynamicDrawUsage);
        this.colAttr.setUsage(THREE.DynamicDrawUsage);
        geo.setAttribute('position', this.posAttr);
        geo.setAttribute('aColor', this.colAttr);
        const idx = [];
        for (let i = 0; i < this.max - 1; i++) {
          const a = i * 2;
          idx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2);
        }
        geo.setIndex(idx);
        geo.setDrawRange(0, 0);
        this.mesh = new THREE.Mesh(geo, SNAKE_MAT);
        this.mesh.frustumCulled = false;
        scene.add(this.mesh);

        // glowing head
        this.headMat = new THREE.SpriteMaterial({
          map: glowTex, transparent: true, depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        this.headMat.color.setHSL(this.hue / 360, 1, 0.55);
        this.head = new THREE.Sprite(this.headMat);
        scene.add(this.head);

        if (this.air) airCount++; else surfCount++;
      }

      // world-up projected into this plane's (u,v) — the climb direction.
      // ~unit length on walls, ~zero on floors/ceilings.
      _computeUp() {
        this.upU = UP.dot(this.plane.xAxis);
        this.upV = UP.dot(this.plane.zAxis);
        this.onFlat = Math.hypot(this.upU, this.upV) < 0.25;
      }

      // crossing a plane's edge: look for an adjacent surface and crawl onto it —
      // fire spreading across the floor finds a wall and starts climbing it
      _tryHop(world) {
        for (const c of colliders) {
          if (c === this.plane) continue;
          _a.subVectors(world, c.point);
          if (Math.abs(_a.dot(c.normal)) > 0.22) continue;
          const px = _a.dot(c.xAxis), pz = _a.dot(c.zAxis);
          if (Math.abs(px) > c.halfX + 0.15 || Math.abs(pz) > c.halfZ + 0.15) continue;
          this.plane = c;
          this.u = THREE.MathUtils.clamp(px, -c.halfX, c.halfX);
          this.v = THREE.MathUtils.clamp(pz, -c.halfZ, c.halfZ);
          this._computeUp();
          if (!this.onFlat) {
            // turn to climb, with a searching wobble
            this.angle = Math.atan2(this.upV, this.upU) + (Math.random() - 0.5) * 1.6;
          }
          if (this.hops < 3) this.opacity = Math.min(1, this.opacity + 0.25); // fresh vigor
          this.hops++;
          return true;
        }
        return false;
      }

      // let go of a sparkler trail: the drawing comes alive and slithers off
      // as a wild rising air snake from wherever the stroke ended
      releaseDriven() {
        if (!this.driven) return;
        this.driven = false;
        this.target = null;
        this.plane = airPlaneAt(this.pts[0]);
        this.u = 0; this.v = 0;
        this._computeUp();
        this.angle = Math.atan2(this.upV, this.upU) + (Math.random() - 0.5) * 1.2;
        this.climb = 0.7;
        this.speed = 0.5;
        this.fade = 0.45;
      }

      update(dt) {
        this.age += dt;
        const F = dt * 60; // frames at 60fps baseline

        if (this.driven) {
          // sparkler mode: head chases the orbiting ball with a touch of silk
          if (this.target) this.pts[0].lerp(this.target, 1 - Math.pow(0.45, F));
          // ribbon faces the viewer while drawn in mid-air
          _cv.setFromMatrixPosition(camera.matrixWorld);
          this.nrm[0].subVectors(_cv, this.pts[0]).normalize();
          this._updateTail(F);
          // sparks crackle off the tip, and bright motes linger along the stroke
          if (Math.random() < 10 * dt) spawnEmber(this.pts[0], 0.15);
          this.resAcc += dt;
          if (this.resAcc > 0.06) {
            this.resAcc = 0;
            _c.setHSL(THREE.MathUtils.euclideanModulo(this.hue, 360) / 360, 1, 0.5);
            pool.spawn(this.pts[0],
              (Math.random() - 0.5) * 0.05, (Math.random() - 0.5) * 0.05, (Math.random() - 0.5) * 0.05,
              _c.r * 0.5, _c.g * 0.5, _c.b * 0.5, 1.1, 0.03, 0);
          }
          this._updateGeometry();
          return true; // never fades while you're drawing with it
        }

        // ---- head steering: oscillating turn rate = the writhing search ----
        this.angle += this.angleSpeed * (1 + Math.sin(this.age * this.flicker + this.ph1) * 0.8) * dt;
        const sp = this.speed * (1 + Math.sin(this.age * 6 + this.ph2) * this.spread);
        let du = Math.cos(this.angle) * sp;
        let dv = Math.sin(this.angle) * sp;
        if (this.onFlat && !this.air) {
          // on the floor: spread outward from the impact, hunting for walls
          const bu = this.u - this.spawnU, bv = this.v - this.spawnV;
          const d = Math.hypot(bu, bv);
          if (d > 0.02) { du += (bu / d) * 0.2; dv += (bv / d) * 0.2; }
        } else {
          // on a wall (or in the air): flames rise
          du += this.upU * this.climb;
          dv += this.upV * this.climb;
        }
        let nu = this.u + du * dt, nv = this.v + dv * dt;

        // reflect at the plane's edges (the original's canvas-edge bounce)…
        const hx = this.plane.halfX, hz = this.plane.halfZ;
        let hitEdge = false;
        if (nu < -hx) { nu = -hx; this.angle = Math.PI - this.angle; hitEdge = true; }
        else if (nu > hx) { nu = hx; this.angle = Math.PI - this.angle; hitEdge = true; }
        if (nv < -hz) { nv = -hz; this.angle = -this.angle; hitEdge = true; }
        else if (nv > hz) { nv = hz; this.angle = -this.angle; hitEdge = true; }
        this.u = nu; this.v = nv;

        // …unless an adjacent surface is there to crawl onto
        if (hitEdge && !this.air) {
          planePoint(this.plane, this.u, this.v, _w);
          this._tryHop(_w);
        }

        planePoint(this.plane, this.u, this.v, _w);
        this.pts[0].copy(_w);
        this.nrm[0].copy(this.plane.normal);

        this._updateTail(F);

        this.opacity -= this.fade * dt;

        // shed embers + paint afterglow residue on the surface
        if (Math.random() < 2.0 * dt) {
          _v.copy(this.pts[0]).addScaledVector(this.nrm[0], 0.02);
          spawnEmber(_v, 0.3);
        }
        if (!this.air) {
          this.resAcc += dt;
          if (this.resAcc > 0.09 && this.opacity > 0.25) {
            this.resAcc = 0;
            spawnResidue(this.pts[0], this.nrm[0], this.hue, this.width);
          }
        }

        this._updateGeometry();
        return this.opacity > 0;
      }

      // follower chain: each segment lerps toward the one ahead, body grows
      _updateTail(F) {
        const k = 1 - Math.pow(0.75, F);
        for (let i = 1; i < this.pts.length; i++) {
          this.pts[i].lerp(this.pts[i - 1], k);
          // guard the normal smoothing: when the trail wraps around the
          // viewer, adjacent view-facing normals can be near-opposite and
          // the lerp passes through zero — normalize(0) is NaN, which
          // exploded into giant garbage triangles across the view
          this.nrm[i].lerp(this.nrm[i - 1], k);
          if (this.nrm[i].lengthSq() < 1e-6) this.nrm[i].copy(this.nrm[i - 1]);
          else this.nrm[i].normalize();
        }
        this.growAcc += F;
        while (this.growAcc >= 2) {
          this.growAcc -= 2;
          if (this.pts.length < this.max) {
            this.pts.push(this.pts[this.pts.length - 1].clone());
            this.nrm.push(this.nrm[this.nrm.length - 1].clone());
          }
        }
      }

      _updateGeometry() {
        const n = this.pts.length;
        const pos = this.posAttr.array;
        const col = this.colAttr.array;
        const hueShift = this.hue + Math.sin(this.age * 12 + this.ph3) * 15;
        const denom = Math.max(n - 1, 1);
        let ppx = 0, ppy = 0, ppz = 0, hasPrevPerp = false;
        for (let i = 0; i < n; i++) {
          const t = i / denom;
          // ribbon direction & in-surface perpendicular
          _d.subVectors(this.pts[Math.min(i + 1, n - 1)], this.pts[Math.max(i - 1, 0)]);
          _p.crossVectors(this.nrm[i], _d);
          if (_p.lengthSq() < 1e-10) {
            if (hasPrevPerp) _p.set(ppx, ppy, ppz);
            else _p.copy(this.plane.xAxis);
          }
          _p.normalize();
          // keep the ribbon's sides consistent segment to segment — a sign
          // flip would cross adjacent quads into a flashing bowtie triangle
          if (hasPrevPerp && (_p.x * ppx + _p.y * ppy + _p.z * ppz) < 0) _p.negate();
          ppx = _p.x; ppy = _p.y; ppz = _p.z;
          hasPrevPerp = true;
          const halfW = this.width * (0.35 + 0.65 * Math.sin(t * Math.PI)) * 0.5 + 0.002;
          const liftOff = this.lift + Math.sin(this.age * 12 + i * 0.7 + this.ph2) * 0.004;
          const cx = this.pts[i].x + this.nrm[i].x * liftOff;
          const cy = this.pts[i].y + this.nrm[i].y * liftOff;
          const cz = this.pts[i].z + this.nrm[i].z * liftOff;
          const o = i * 6;
          pos[o]     = cx + _p.x * halfW; pos[o + 1] = cy + _p.y * halfW; pos[o + 2] = cz + _p.z * halfW;
          pos[o + 3] = cx - _p.x * halfW; pos[o + 4] = cy - _p.y * halfW; pos[o + 5] = cz - _p.z * halfW;
          // the original's exact gradient: hot near head, deeper + lighter down the tail
          _c.setHSL(
            THREE.MathUtils.euclideanModulo(hueShift - t * 30, 360) / 360,
            1 - t * 0.2,
            0.5 + t * 0.25
          );
          const intensity = Math.sin(t * Math.PI) * 0.5 + 0.5;
          const a = Math.max(0, this.opacity) * (1 - t * 0.3) * intensity;
          const co = i * 8;
          col[co] = _c.r; col[co + 1] = _c.g; col[co + 2] = _c.b; col[co + 3] = a;
          col[co + 4] = _c.r; col[co + 5] = _c.g; col[co + 6] = _c.b; col[co + 7] = a;
        }
        this.posAttr.needsUpdate = true;
        this.colAttr.needsUpdate = true;
        this.mesh.geometry.setDrawRange(0, Math.max(0, (n - 1) * 6));

        // glowing head, breathing with the flicker
        this.head.position.copy(this.pts[0]).addScaledVector(this.nrm[0], this.lift * 2);
        const hs = this.width * (this.air ? 3.5 : 5.0) *
          (0.75 + 0.25 * Math.sin(this.age * this.flicker + this.ph1));
        this.head.scale.set(hs, hs, 1);
        this.headMat.opacity = Math.max(0, this.opacity) * 0.85;
      }

      dispose() {
        scene.remove(this.mesh);
        scene.remove(this.head);
        this.mesh.geometry.dispose();
        this.headMat.dispose();
        if (this.air) airCount--; else surfCount--;
      }
    }

    /* ================= SNAKE SPAWNERS ================= */
    let lastImpactSpawn = 0;
    function spawnImpactSnakes(plane, point, speed) {
      const now = performance.now();
      if (now - lastImpactSpawn < 130) return;
      lastImpactSpawn = now;
      _a.subVectors(point, plane.point);
      const u = _a.dot(plane.xAxis);
      const v = _a.dot(plane.zAxis);
      const count = Math.min(6, 2 + Math.floor(speed * 1.3));
      const upU = UP.dot(plane.xAxis), upV = UP.dot(plane.zAxis);
      const wallish = Math.hypot(upU, upV) > 0.25;
      for (let i = 0; i < count; i++) {
        if (surfCount >= MAX_SURF_SNAKES) break;
        const s = new FireSnake(plane,
          THREE.MathUtils.clamp(u + (Math.random() - 0.5) * 0.12, -plane.halfX, plane.halfX),
          THREE.MathUtils.clamp(v + (Math.random() - 0.5) * 0.12, -plane.halfZ, plane.halfZ),
          { boost: Math.min(2.5, speed * 0.4) });
        // on walls, fan the snakes out around "up" so they immediately start
        // climbing in a writhing spread; on the floor they scatter everywhere
        if (wallish) s.angle = Math.atan2(upV, upU) + (Math.random() - 0.5) * 2.8;
        snakes.push(s);
      }
    }

    // synthetic vertical plane at a point — the canvas air snakes writhe in
    function airPlaneAt(pos) {
      const th = Math.random() * Math.PI * 2;
      const normal = new THREE.Vector3(Math.cos(th), 0, Math.sin(th));
      const xAxis = new THREE.Vector3(-Math.sin(th), 0, Math.cos(th));
      const zAxis = new THREE.Vector3().crossVectors(normal, xAxis);
      return { point: pos.clone(), normal, xAxis, zAxis, halfX: 99, halfZ: 99 };
    }

    // licking tongues of flame rising off the ball (the ball is always ablaze)
    function spawnAirFlame(pos, big) {
      if (airCount >= MAX_AIR_SNAKES) return;
      const plane = airPlaneAt(pos);
      const s = new FireSnake(plane, 0, 0, {
        air: true,
        maxPoints: big ? 26 : 18,
        fade: big ? 0.55 + Math.random() * 0.3 : 1.0 + Math.random() * 0.6,
        width: big ? 0.04 + Math.random() * 0.015 : 0.026 + Math.random() * 0.012,
        climb: 0.8 + Math.random() * 0.5,
        boost: big ? 1.2 : 0
      });
      s.angle = Math.atan2(s.upV, s.upU) + (Math.random() - 0.5) * 1.8;
      snakes.push(s);
    }

    /* ================= COLLIDERS / REAL-WORLD PLANES ================= */
    function makePlane(px, py, pz, nx, ny, nz, ax, ay, az, hx, hz) {
      const normal = new THREE.Vector3(nx, ny, nz).normalize();
      const xAxis = new THREE.Vector3(ax, ay, az).normalize();
      return {
        point: new THREE.Vector3(px, py, pz),
        normal, xAxis,
        zAxis: new THREE.Vector3().crossVectors(normal, xAxis).normalize(),
        halfX: hx, halfZ: hz
      };
    }

    // fallback room: floor + 4 walls + ceiling around where you start
    // (used until real detected planes arrive, and in preview)
    function defaultRoom() {
      return [
        makePlane(0, 0, 0,      0, 1, 0,  1, 0, 0, 2.8, 2.8),  // floor
        makePlane(0, 2.6, 0,    0, -1, 0, 1, 0, 0, 2.8, 2.8),  // ceiling
        makePlane(0, 1.3, -2.8, 0, 0, 1,  1, 0, 0, 2.8, 1.3),  // back wall
        makePlane(0, 1.3, 2.8,  0, 0, -1, 1, 0, 0, 2.8, 1.3),  // front wall
        makePlane(-2.8, 1.3, 0, 1, 0, 0,  0, 0, 1, 2.8, 1.3),  // left wall
        makePlane(2.8, 1.3, 0,  -1, 0, 0, 0, 0, 1, 2.8, 1.3)   // right wall
      ];
    }

    let planesTimer = 0;
    function updatePlanes(frame, dt) {
      planesTimer -= dt;
      if (planesTimer > 0) return;
      planesTimer = 0.5;
      const ref = renderer.xr.getReferenceSpace();
      if (!ref || !frame.detectedPlanes || frame.detectedPlanes.size === 0) return;
      const list = [];
      let hasFloor = false;
      frame.detectedPlanes.forEach(plane => {
        const pose = frame.getPose(plane.planeSpace, ref);
        if (!pose) return;
        _m.fromArray(pose.transform.matrix);
        const e = _m.elements;
        const point = new THREE.Vector3(e[12], e[13], e[14]);
        const xAxis = new THREE.Vector3(e[0], e[1], e[2]).normalize();
        const normal = new THREE.Vector3(e[4], e[5], e[6]).normalize(); // plane local Y
        const zAxis = new THREE.Vector3(e[8], e[9], e[10]).normalize();
        let hx = 0, hz = 0;
        if (plane.polygon) for (const p of plane.polygon) {
          hx = Math.max(hx, Math.abs(p.x));
          hz = Math.max(hz, Math.abs(p.z));
        }
        if (normal.y > 0.9 && point.y < 0.3) hasFloor = true;
        list.push({ point, normal, xAxis, zAxis, halfX: hx || 2, halfZ: hz || 2 });
      });
      if (!hasFloor) list.push(makePlane(0, 0, 0, 0, 1, 0, 1, 0, 0, 4, 4));
      colliders = list;
    }

    /* ================= SCORCH SMUDGES =================
     * The ball leaves a black soot mark wherever it strikes a surface,
     * which slowly fades away. Normal blending (not additive) so it
     * genuinely darkens the passthrough wall behind it. */
    let smudgeTex = null, smudgeGeo = null;
    const smudges = [];
    const MAX_SMUDGES = 24;

    function makeSmudgeTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 128;
      const x = c.getContext('2d');
      // layered soft blots — an irregular soot splat, not a clean disc
      for (let i = 0; i < 16; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 30;
        const cx = 64 + Math.cos(a) * r, cy = 64 + Math.sin(a) * r;
        const rad = 12 + Math.random() * 28;
        const g = x.createRadialGradient(cx, cy, 0, cx, cy, rad);
        g.addColorStop(0, 'rgba(0,0,0,0.45)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        x.fillStyle = g;
        x.fillRect(0, 0, 128, 128);
      }
      return new THREE.CanvasTexture(c);
    }

    const _zAxis = new THREE.Vector3(0, 0, 1);
    function spawnSmudge(pos, normal, speed) {
      if (!smudgeTex) { smudgeTex = makeSmudgeTexture(); smudgeGeo = new THREE.PlaneGeometry(1, 1); }
      if (smudges.length >= MAX_SMUDGES) {
        const old = smudges.shift();
        scene.remove(old.mesh);
        old.mesh.material.dispose();
      }
      const peak = Math.min(0.8, 0.35 + speed * 0.08);
      const mat = new THREE.MeshBasicMaterial({
        map: smudgeTex, transparent: true, depthWrite: false, opacity: peak
      });
      const mesh = new THREE.Mesh(smudgeGeo, mat);
      const s = 0.16 + Math.min(0.22, speed * 0.035) + Math.random() * 0.06;
      mesh.scale.set(s, s, 1);
      // sit flush on the surface, a hair off to avoid z-fighting
      mesh.position.copy(pos).addScaledVector(normal, 0.005);
      mesh.quaternion.setFromUnitVectors(_zAxis, normal);
      mesh.rotateZ(Math.random() * Math.PI * 2);
      scene.add(mesh);
      smudges.push({ mesh, age: 0, life: 7 + Math.random() * 4, peak });
    }

    function updateSmudges(dt) {
      for (let i = smudges.length - 1; i >= 0; i--) {
        const s = smudges[i];
        s.age += dt;
        const k = s.age / s.life;
        if (k >= 1) {
          scene.remove(s.mesh);
          s.mesh.material.dispose();
          smudges.splice(i, 1); // keep order so eviction always drops the oldest
        } else {
          s.mesh.material.opacity = s.peak * (1 - k * k); // lingers, then burns off
        }
      }
    }

    /* ================= BALL PHYSICS ================= */
    // Swept collision: test the segment the ball travelled this frame, not just
    // where it ended up. A hard throw covers more than a ball-radius per frame,
    // so a position-only test let it land beyond the wall — where the normal
    // flip read it as "approaching from the other side" and never bounced.
    const _b = new THREE.Vector3();
    const _hitP = new THREE.Vector3();
    const _stepFrom = new THREE.Vector3(); // ball position before this frame's move
    function collideBall(pos, vel, r, prev) {
      for (const c of colliders) {
        _a.subVectors(prev, c.point);
        _n.copy(c.normal);
        let dPrev = _a.dot(_n);
        if (dPrev < 0) { _n.negate(); dPrev = -dPrev; } // orient toward where the ball started
        _b.subVectors(pos, c.point);
        const dNow = _b.dot(_n);
        if (dNow > r) continue;                    // still clear of the plane
        if (dPrev < 0.001 && dNow < -r) continue;  // started embedded/behind: not ours
        const vn = vel.dot(_n);
        if (vn >= 0) continue;                     // moving away
        // first point along prev→pos where the ball surface touches the plane
        const denom = dPrev - dNow;
        const tHit = denom > 1e-6 ? THREE.MathUtils.clamp((dPrev - r) / denom, 0, 1) : 0;
        _hitP.lerpVectors(prev, pos, tHit);
        _a.subVectors(_hitP, c.point);
        const px = _a.dot(c.xAxis), pz = _a.dot(c.zAxis);
        if (Math.abs(px) > c.halfX + r || Math.abs(pz) > c.halfZ + r) continue;
        const impactSpeed = -vn;
        vel.addScaledVector(_n, -1.8 * vn);  // restitution 0.8 — lively, like the original
        if (impactSpeed > 0.25) vel.multiplyScalar(0.96); // a whisper of friction on real hits
        const dAtHit = dPrev + (dNow - dPrev) * tHit;
        pos.copy(_hitP).addScaledVector(_n, Math.max(0, r - dAtHit) + 0.001);
        return { plane: c, normal: _n.clone(), speed: impactSpeed };
      }
      return null;
    }

    /* ================= INTERACTION ================= */
    const ctrlVel = new THREE.Vector3();
    const ctrlPrev = new THREE.Vector3();
    // the ball's true motion, tracked every frame — releasing mid-flight
    // keeps the momentum it actually has, wherever it is on its way to you
    const ballVel = new THREE.Vector3();
    const ballPrev = new THREE.Vector3();
    let ballHasPrev = false;
    let ctrlHasPrev = false;
    let userInteracted = false;
    let holdTrail = null;

    function grab(controller) {
      mode = 'attracted';
      targetController = controller;
      ctrlVel.set(0, 0, 0);
      ctrlHasPrev = false;
      igniteArp(ball.position);
      // sparkler: the orbiting ball draws a snake spiral behind it, so you
      // can write in the air; it stays alight as long as you hold the trigger
      if (holdTrail) holdTrail.releaseDriven();
      holdTrail = new FireSnake(airPlaneAt(ball.position), 0, 0, {
        air: true, driven: true, maxPoints: 110,
        // much fatter than a wall spiral — this is the sparkler stroke
        width: 0.09 + Math.random() * 0.02
      });
      holdTrail.target = ball.position; // live reference — follows the orbit
      snakes.push(holdTrail);
      startPluckRoll();
    }
    function release() {
      stopPluckRoll();
      if (holdTrail) { holdTrail.releaseDriven(); holdTrail = null; }
      if (mode !== 'attracted') return;
      mode = 'free';
      velocity.copy(ballVel).multiplyScalar(1.2);   // the ball keeps its real momentum
      velocity.addScaledVector(ctrlVel, 1.6);       // plus your arm's flick
      velocity.y += 0.5;
      if (velocity.length() > 12) velocity.setLength(12);
      for (let i = 0; i < 7; i++) spawnAirFlame(ball.position, true);
      emberBurst(ball.position, 22);
      whoosh(ball.position, velocity.length());
    }

    /* ================= INIT ================= */
    async function init(preview) {
      isPreview = preview;
      entered = true;
      introEl.style.display = 'none';
      startBtn.style.display = 'none';
      previewBtn.style.display = 'none';
      initAudio();

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 100);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: !preview });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.setClearColor(0x000000, preview ? 1 : 0);
      document.body.appendChild(renderer.domElement);

      glowTex = makeGlowTexture();
      ball = makeFireBall();
      scene.add(ball);
      // dormant until the match is struck: just the dark smoldering core
      ballGlow.visible = false;
      ballHot.visible = false;
      pool = new ParticlePool(1600);
      scene.add(pool.points);
      colliders = defaultRoom();

      // darkening pass — dims the passthrough so the fire's light owns the
      // room. A fullscreen shader quad (clip-space, ignores all matrices):
      // covers every pixel of both eyes by construction. The previous
      // camera-centred sphere dome could flash gaps at its pole — a bright
      // undimmed triangle of passthrough directly overhead.
      tintMat = new THREE.ShaderMaterial({
        uniforms: { uOpacity: { value: TINT_START } },
        transparent: true, depthTest: false, depthWrite: false,
        vertexShader: `void main(){ gl_Position = vec4(position.xy, 0.0, 1.0); }`,
        fragmentShader: `uniform float uOpacity;
          void main(){ gl_FragColor = vec4(0.0, 0.0, 0.0, uOpacity); }`
      });
      tintMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), tintMat);
      tintMesh.renderOrder = -1;
      tintMesh.frustumCulled = false;
      scene.add(tintMesh);

      makeTitle();

      // pre-compile every shader while still on the 2D page: the snake
      // ribbon material otherwise compiles mid-session on the first spawn,
      // and that stall drops frames — dropped frames are what let the
      // compositor's reprojection expose the bright buffer edge
      const warm = new FireSnake(airPlaneAt(homePos), 0, 0, { air: true });
      renderer.compile(scene, camera);
      warm.dispose();

      if (preview) initPreview();
      else await initXR();

      lastTime = performance.now();
      renderer.setAnimationLoop(animate);
    }

    /* ================= AR ================= */
    async function initXR() {
      renderer.xr.enabled = true;
      try {
        xrSession = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['hand-tracking', 'plane-detection']
        });
        await renderer.xr.setSession(xrSession);
        xrSession.addEventListener('end', () => location.reload());

        // steadier frame pacing: prefer 72Hz so every frame makes the
        // compositor deadline — a missed frame forces reprojection, which
        // samples past the rendered FOV into alpha-0 border, and in a
        // darkened passthrough scene that leaks a bright flash of raw
        // passthrough at the edge of view
        try {
          const rates = xrSession.supportedFrameRates;
          if (rates && rates.length && xrSession.updateTargetFrameRate) {
            let pick = rates[0];
            for (const r of rates) if (Math.abs(r - 72) < Math.abs(pick - 72)) pick = r;
            xrSession.updateTargetFrameRate(pick).catch(() => { });
          }
        } catch (e) { }

        for (let i = 0; i < 2; i++) {
          const c = renderer.xr.getController(i);
          const g = new THREE.BufferGeometry().setFromPoints(
            [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -0.4)]);
          c.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xff7700 })));
          c.addEventListener('selectstart', () => { ignite(); grab(c); });
          c.addEventListener('selectend', release);
          scene.add(c);
          scene.add(renderer.xr.getControllerGrip(i));
        }
      } catch (e) {
        alert('Failed to start AR session: ' + e.message);
        location.reload();
      }
    }

    /* ================= PREVIEW (browser, no headset) ================= */
    let camYaw = 0, camPitch = 0, dragging = false, lastX = 0, lastY = 0;
    let downTime = 0, downX = 0, downY = 0, demoT = 0;
    function initPreview() {
      hintEl.textContent = 'Preview mode — open on a headset for the real AR experience';
      const grid = new THREE.GridHelper(10, 20, 0xff6600, 0x331100);
      grid.material.opacity = 0.35; grid.material.transparent = true;
      scene.add(grid);
      const room = new THREE.Mesh(
        new THREE.BoxGeometry(5.6, 2.6, 5.6),
        new THREE.MeshBasicMaterial({ color: 0xff6600, wireframe: true, transparent: true, opacity: 0.10 })
      );
      room.position.set(0, 1.3, 0);
      scene.add(room);

      camera.position.set(0, 1.6, 1.8);
      updatePreviewCam();

      const el = renderer.domElement;
      el.addEventListener('pointerdown', e => {
        dragging = true;
        lastX = downX = e.clientX; lastY = downY = e.clientY;
        downTime = performance.now();
      });
      addEventListener('pointerup', e => {
        dragging = false;
        const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
        if (performance.now() - downTime < 250 && moved < 8) {
          if (!lit) { ignite(); return; } // first click strikes the match
          // quick click: throw the fire toward the clicked point
          userInteracted = true;
          const ndc = new THREE.Vector2(
            (e.clientX / innerWidth) * 2 - 1,
            -(e.clientY / innerHeight) * 2 + 1);
          _v.set(ndc.x, ndc.y, 0.5).unproject(camera).sub(camera.position).normalize();
          velocity.copy(_v).multiplyScalar(7);
          velocity.y += 1.0;
          mode = 'free';
          for (let i = 0; i < 6; i++) spawnAirFlame(ball.position, true);
          emberBurst(ball.position, 18);
          whoosh(ball.position, 7);
        }
      });
      addEventListener('pointermove', e => {
        if (!dragging) return;
        camYaw -= (e.clientX - lastX) * 0.005;
        camPitch -= (e.clientY - lastY) * 0.005;
        camPitch = Math.max(-1.2, Math.min(1.2, camPitch));
        lastX = e.clientX; lastY = e.clientY;
        updatePreviewCam();
      });
    }
    function updatePreviewCam() {
      camera.position.set(0, 1.6, 1.8);
      const dir = new THREE.Vector3(
        Math.sin(camYaw) * Math.cos(camPitch),
        Math.sin(camPitch),
        -Math.cos(camYaw) * Math.cos(camPitch)
      );
      camera.lookAt(camera.position.clone().add(dir));
    }

    /* ================= LOOP ================= */
    let lastTime = performance.now();
    let emitAcc = 0;
    function animate(time, frame) {
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      const t = now / 1000;

      ballCore.material.uniforms.uTime.value = t;
      ballGlow.material.uniforms.uTime.value = t;
      ballHot.material.opacity = 0.45 + Math.sin(t * 20) * 0.1;

      if (!isPreview && frame) updatePlanes(frame, dt);

      // room darkness: starts near-black, eases up a little while the title
      // hovers, then settles brighter once lit — flickering with the fire
      const tintTarget = lit ? TINT_LIT : TINT_INTRO;
      tintLevel += (tintTarget - tintLevel) * (1 - Math.exp(-(lit ? 1.5 : 0.45) * dt));
      let fireGlow = 0;
      if (lit) {
        fireGlow = Math.min(0.10, surfCount * 0.006 + airCount * 0.004)
          + 0.02 * Math.sin(t * 13) + 0.015 * Math.sin(t * 7.7);
      }
      tintMat.uniforms.uOpacity.value = THREE.MathUtils.clamp(tintLevel - fireGlow, 0.3, TINT_START);

      // hovering title above the ball: cycles between "Take your time /
      // Flame Thrower" and "Pull the trigger to strike the match" until
      // the user interacts, then burns away
      if (!titleGone) {
        titleT += dt;
        titleMesh.position.y = homePos.y + 0.5 + Math.sin(titleT * 1.2) * 0.02;
        if (lit) {
          titleMat.opacity -= dt;
          if (titleMat.opacity <= 0) {
            scene.remove(titleMesh);
            titleMat.dispose();
            titleTex.dispose();
            titleGone = true;
          }
        } else if (titlePhase === 'in') {
          titleMat.opacity = Math.min(0.95, titleMat.opacity + dt * 0.6);
          if (titleMat.opacity >= 0.95) { titlePhase = 'hold'; titleHold = 0; }
        } else if (titlePhase === 'hold') {
          titleHold += dt;
          if (titleHold > 3.8) titlePhase = 'out';
        } else { // fade out, swap message, fade back in
          titleMat.opacity = Math.max(0, titleMat.opacity - dt * 1.1);
          if (titleMat.opacity <= 0) {
            titleWhich ^= 1;
            drawTitle(titleWhich);
            titlePhase = 'in';
          }
        }
      }

      // preview auto-demo once lit, until the user clicks: the ball cruises
      // on its own now, so the demo just throws it afresh every so often
      if (isPreview && lit && !userInteracted) {
        demoT += dt;
        if (mode === 'free' && demoT > 7.0) { orbitAngle = 0; mode = 'attracted'; targetController = null; demoT = 0; }
        else if (mode === 'attracted' && demoT > 2.4) {
          ctrlVel.set((Math.random() - 0.5) * 5, 0.8 + Math.random() * 1.6, -2 - Math.random() * 3);
          release(); demoT = 0;
        }
      }

      if (mode === 'attracted') {
        orbitAngle += 6 * dt;
        let anchor;
        if (targetController) {
          anchor = targetController.getWorldPosition(_hand);
          if (ctrlHasPrev) {
            _v.subVectors(anchor, ctrlPrev).divideScalar(Math.max(dt, 1e-3));
            ctrlVel.lerp(_v, 1 - Math.exp(-18 * dt));
          }
          ctrlPrev.copy(anchor); ctrlHasPrev = true;
        } else {
          anchor = tempVec.copy(homePos);
        }
        const r = 0.32;
        _w.set(
          anchor.x + Math.cos(orbitAngle) * r,
          anchor.y + 0.05 + Math.sin(orbitAngle * 1.7) * 0.12,
          anchor.z + Math.sin(orbitAngle) * r
        );
        ball.position.lerp(_w, 1 - Math.exp(-12 * dt));
        ballCore.material.uniforms.uHeat.value = 1.5;
      } else if (mode === 'free') {
        ballCore.material.uniforms.uHeat.value = 1.1;
        // gravity fades as the ball slows: hard throws arc and slam, but a
        // slowing fireball turns buoyant and drifts — it never comes to rest
        const sp = velocity.length();
        velocity.y -= 9.8 * THREE.MathUtils.smoothstep(sp, 1.2, 4.0) * dt;
        if (sp < CRUISE_SPEED) {
          if (sp < 0.05) {
            velocity.set(Math.random() - 0.5, 0.2 + Math.random() * 0.3, Math.random() - 0.5)
              .normalize().multiplyScalar(CRUISE_SPEED);
          } else {
            velocity.multiplyScalar(1 + 0.6 * dt); // gently regain cruising speed
          }
        }
        _stepFrom.copy(ball.position); // where the ball was before this step
        ball.position.addScaledVector(velocity, dt);
        const hit = collideBall(ball.position, velocity, ballRadius, _stepFrom);
        if (hit && hit.speed > 0.25) {
          // impact point on the surface
          _v.copy(ball.position).addScaledVector(hit.normal, -ballRadius);
          spawnImpactSnakes(hit.plane, _v, hit.speed);
          emberBurst(_v, Math.min(20, 8 + Math.floor(hit.speed * 3)));
          bounceSound(_v, hit.normal, hit.speed);
          spawnSmudge(_v, hit.normal, hit.speed);
        }
        if (ball.position.y < -3) { // escaped the room: re-enter, keep moving
          ball.position.copy(homePos);
          velocity.set(Math.random() - 0.5, 0.1, Math.random() - 0.5)
            .normalize().multiplyScalar(1.5);
        }
      } else { // idle: pre-ignition only — hover at home until the match strikes
        ballCore.material.uniforms.uHeat.value = 1.0;
        idleTime += dt;
        tempVec.copy(homePos);
        tempVec.y += Math.sin(idleTime * 1.5) * 0.04;
        ball.position.lerp(tempVec, 1 - Math.exp(-3 * dt));
      }

      // track the ball's real velocity (smoothed) for momentum-true throws
      if (ballHasPrev) {
        _v.subVectors(ball.position, ballPrev).divideScalar(Math.max(dt, 1e-3));
        ballVel.lerp(_v, 1 - Math.exp(-16 * dt));
      }
      ballPrev.copy(ball.position);
      ballHasPrev = true;

      // dormant before the match strikes: a dark, faintly smoldering ember
      if (!lit) ballCore.material.uniforms.uHeat.value = 0.18;

      // corona: face the viewer, share the core's heat, breathe gently
      ballGlow.quaternion.copy(camera.quaternion);
      ballGlow.material.uniforms.uHeat.value = ballCore.material.uniforms.uHeat.value;
      ballGlow.scale.setScalar(1 + 0.05 * Math.sin(t * 9.7) + 0.04 * Math.sin(t * 5.3));

      // once lit the ball is always ablaze: licking tongues + a drizzle of embers
      if (lit) {
        emitAcc += dt * (mode === 'attracted' ? 1.7 : 1);
        while (emitAcc > 0.14) {
          emitAcc -= 0.14;
          spawnAirFlame(ball.position, false);
          if (Math.random() < 0.6) spawnEmber(ball.position, 0.5);
        }
      }

      for (let i = snakes.length - 1; i >= 0; i--) {
        if (!snakes[i].update(dt)) {
          snakes[i].dispose();
          snakes[i] = snakes[snakes.length - 1];
          snakes.pop();
        }
      }
      pool.update(dt);
      updateSmudges(dt);

      renderer.render(scene, camera);
    }

    addEventListener('resize', () => {
      if (!camera) return;
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
